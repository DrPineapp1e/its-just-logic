            activeAction:'laser',viewMode:'hit',
            pendingToast:{text:'Laser armed. Pick a target coordinate.',color:'#ff4488'}};
        case 'torpedo':
          return {...prev,selectedItem:null,
            siloPlaceMode:true,viewMode:'your',
            pendingToast:{text:'Torpedo Silo: click a highlighted cell adjacent to your territory',color:'#8855ff'}};
        case 'probe': {
          // Scan opponent grid for uncollected resources — reveal coords only, no type info
          // Spy cells are included so they can appear as decoys in the results
          const oppGrid=prev.opponentGrid;
          const allRes=[];
          for(let r=0;r<12;r++) for(let c=0;c<12;c++){
            const cell=oppGrid[r][c];
            if((cell.type==='br'||cell.type==='sr_res'||cell.type==='cr'||cell.type==='spy')&&!cell.collected)
              allRes.push([r,c]);
          }
          const shuffled=[...allRes].sort(()=>Math.random()-0.5).slice(0,3);
          const coords=shuffled.map(([r,c])=>`${COLS[c]}${r+1}`);
          const msg=coords.length
            ?`Resource Probe: detected at ${coords.join(', ')} — types unknown`
            :`Resource Probe: no resources detected`;
          const who=prev.pvpMode?`p${prev.activePlayer}`:'you';
          return {...prev,inventory:consume(prev.inventory),selectedItem:null,
            turn:prev.aiMode?'ai':'you',
            pvpPendingPass:prev.pvpMode,
            log:[{who,text:msg},...prev.log],
            pendingToast:{text:msg,color:'#aa88ff'}};
        }
        case 'spy': {
          if(!prev.aiMode&&!prev.pvpMode)
            return {...prev,pendingToast:{text:'Spy only works against an opponent!',color:'#ff4444'}};
          if(prev.spy&&prev.spy.status==='placed')
            return {...prev,pendingToast:{text:'A spy is already deployed. Detonate or wait.',color:'#ff4444'}};
          return {...prev,selectedItem:null,
            spyPlaceMode:true,viewMode:'your',
            pendingToast:{text:'Spy Resource: click any empty cell on your grid to plant the decoy',color:'#1a88cc'}};
        }
        case 'decoy': {
          // Pick a random empty tile as the fake source
          const emptyCells=[];
          for(let r=0;r<12;r++) for(let c=0;c<12;c++)
            if(prev.opponentGrid[r][c].type==='empty') emptyCells.push([r,c]);
          // Pick a random opponent territory tile as the fake target
          const terrCells=[];
          for(let r=0;r<12;r++) for(let c=0;c<12;c++){
            const t=prev.opponentGrid[r][c].type;
            if(t==='territory'||t==='starting') terrCells.push([r,c]);
          }
          if(!emptyCells.length||!terrCells.length)
            return {...prev,pendingToast:{text:'No valid targets for decoy!',color:'#ff4444'}};
          const [fr,fc]=emptyCells[Math.floor(Math.random()*emptyCells.length)];
          const [tr,tc]=terrCells[Math.floor(Math.random()*terrCells.length)];
          const fromCoord=`${COLS[fc]}${fr+1}`;
          const toCoord=`${COLS[tc]}${tr+1}`;
          const who=prev.pvpMode?`p${prev.activePlayer}`:'you';
          if(prev.pvpMode){
            // Opponent sees fake attack on their turn, gets one "panic" move, then reveal
            return {...prev,inventory:consume(prev.inventory),selectedItem:null,
              pendingDecoy:{from:fromCoord,to:toCoord,attackerPlayer:prev.activePlayer},
              pvpPendingPass:true,
              log:[{who,text:`Decoy launched from ${fromCoord} — watching for opponent reaction.`},...prev.log],
              pendingToast:{text:`Decoy sent. Opponent sees fake attack signal.`,color:'#aaaa22'}};
          }
          // AI mode — AI will react (panic) on their turn, then reveal
          return {...prev,inventory:consume(prev.inventory),selectedItem:null,
            turn:'ai',
            pendingDecoy:{from:fromCoord,to:toCoord},
            log:[{who,text:`Decoy launched from ${fromCoord} — ${botName(prev.aiDifficulty)} sees fake attack.`},...prev.log],
            pendingToast:{text:`Decoy sent. ${botName(prev.aiDifficulty)} sees a fake attack signal.`,color:'#aaaa22'}};
        }
        default:
          return {...prev,pendingToast:{text:'Effect coming soon',color:'#555555'}};
      }
    });
  },[]);

  // Place a station tile anywhere on empty grid
  const placeStation=useCallback((r,c)=>{
    setGs(prev=>{
      if(!prev.stationMode) return prev;
      if(prev.yourGrid[r][c].type!=='empty') return {...prev,pendingToast:{text:'Must place on an empty cell',color:'#ff4444'}};
      const g=cloneGrid(prev.yourGrid);
      g[r][c]=mkCell('station');
      // Collect adjacent CRs (grants placementRemaining)
      const toCollect=autoExpandCRs(g);
      toCollect.forEach(([cr,cc])=>{ g[cr][cc]={...g[cr][cc],collected:true}; });
      const bonusTiles=toCollect.length;
      // Sync p2 opponent grid in pvp
      let newP2=prev.p2;
      if(prev.pvpMode&&prev.p2){
        const p2OppGrid=prev.p2.opponentGrid.map(row=>row.map(cell=>({...cell})));
        p2OppGrid[r][c]={...p2OppGrid[r][c],type:'station'};
        toCollect.forEach(([cr,cc])=>{
          if(p2OppGrid[cr][cc].type==='cr'&&!p2OppGrid[cr][cc].collected)
            p2OppGrid[cr][cc]={...p2OppGrid[cr][cc],collected:true};
        });
        newP2={...prev.p2,opponentGrid:p2OppGrid};
      }
      const stationSize=countStation(g);
      const toastTxt=bonusTiles>0
        ?`Station placed! CR adjacent — ${bonusTiles} territory tile${bonusTiles!==1?'s':''} to place.`
        :`Station tile placed! Station size: ${stationSize}`;
      return {...prev,yourGrid:g,p2:newP2,stationMode:false,
        placementMode:bonusTiles>0,placementRemaining:(prev.placementRemaining||0)+bonusTiles,
        viewMode:bonusTiles>0?'your':prev.viewMode,
        turn:prev.aiMode&&!bonusTiles?'ai':'you',
        pvpPendingPass:prev.pvpMode&&!bonusTiles,
        pendingToast:{text:toastTxt,color:'#00aacc'}};
    });
  },[]);

  const cancelStation=useCallback(()=>{
    setGs(prev=>({...prev,stationMode:false,
      pendingToast:{text:'Space Station cancelled',color:'#555555'}}));
  },[]);

  // Add Root: add an extra starting tile (old root stays, new tile becomes ALSO a starting tile)
  const applyReroot=useCallback((r,c)=>{
    setGs(prev=>{
      if(!prev.rerootMode) return prev;
      const cell=prev.yourGrid[r][c];
      if(cell.type!=='territory'&&cell.type!=='station')
        return {...prev,pendingToast:{text:'Can only Add Root to a territory or station tile',color:'#ff4444'}};
      const g=cloneGrid(prev.yourGrid);
      // Old starting tile STAYS as 'starting' — we are ADDING a root, not moving one
      g[r][c]=mkCell('starting');
      // Prune now BFS from all starting tiles (original + new one)
      const {grid:pruned,removed}=pruneDisconnected(g,prev.ssR,prev.ssC);
      const newTerritory=prev.territory-(removed>0?removed:0);
      // Sync p2 opponent grid
      let newP2=prev.p2;
      if(prev.pvpMode&&prev.p2){
        const p2OppGrid=prev.p2.opponentGrid.map(row=>row.map(cell2=>({...cell2})));
        p2OppGrid[r][c]=mkCell('starting');
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(pruned[pr][pc].type==='empty'&&p2OppGrid[pr][pc].type==='territory')
            p2OppGrid[pr][pc]=mkCell('empty');
        }
        newP2={...prev.p2,opponentGrid:p2OppGrid};
      }
      const pruneNote=removed>0?` ${removed} disconnected tile${removed!==1?'s':''} terminated.`:'';
      return {...prev,yourGrid:pruned,territory:Math.max(1,newTerritory),
        p2:newP2,rerootMode:false,
        turn:prev.aiMode?'ai':'you',
        pvpPendingPass:prev.pvpMode,
        pendingToast:{text:`Added root at ${COLS[c]}${r+1}.${pruneNote}`,color:'#22aa55'},
        log:[{who:prev.pvpMode?`p${prev.activePlayer}`:'you',
          text:`Used Add Root — extra root placed at ${COLS[c]}${r+1}.${pruneNote}`},...prev.log]};
    });
  },[]);

  const cancelReroot=useCallback(()=>{
    setGs(prev=>({...prev,rerootMode:false,
      pendingToast:{text:'Add Root cancelled',color:'#555555'}}));
  },[]);

  const applyShield=useCallback((r,c)=>{
    setGs(prev=>{
      if(!prev.shieldMode) return prev;
      const cell=prev.yourGrid[r][c];
      if(cell.type!=='territory'&&cell.type!=='starting'&&cell.type!=='station')
        return {...prev,pendingToast:{text:'Can only shield territory or station tiles',color:'#ff4444'}};
      if(prev.shieldedCells.some(s=>s.r===r&&s.c===c))
        return {...prev,pendingToast:{text:'Already shielded',color:'#ff4444'}};
      return {...prev,shieldedCells:[...prev.shieldedCells,{r,c}],shieldMode:false,
        turn:prev.aiMode?'ai':'you',
        pvpPendingPass:prev.pvpMode,
        pendingToast:{text:`${COLS[c]}${r+1} is now shielded!`,color:'#55aaff'}};
    });
  },[]);

  const cancelShield=useCallback(()=>{
    setGs(prev=>({...prev,shieldMode:false,
      pendingToast:{text:'Shield cancelled',color:'#555555'}}));
  },[]);


  const placeSilo=useCallback((r,c)=>{
    setGs(prev=>{
      if(!prev.siloPlaceMode) return prev;
      const vsp=validSiloPositions(prev.yourGrid);
      if(!vsp.has(`${r},${c}`)) return prev;
      const torpItem=prev.inventory.find(i=>i.id==='torpedo');
      if(!torpItem) return {...prev,siloPlaceMode:false};
      const newInv=prev.inventory.filter(i=>i.iid!==torpItem.iid);
      const g=cloneGrid(prev.yourGrid);
      g[r][c]={type:'silo',collected:false,opponentSearched:false};
      return {...prev,
        yourGrid:g,inventory:newInv,selectedItem:null,siloPlaceMode:false,
        turn:prev.aiMode?'ai':'you',
        pvpPendingPass:prev.pvpMode,
        log:[{who:prev.pvpMode?`p${prev.activePlayer}`:'you',text:`Torpedo silo placed at ${COLS[c]}${r+1}. Click it to fire.`},...prev.log],
        pendingToast:{text:`Torpedo Silo placed at ${COLS[c]}${r+1}! Click it anytime to fire.`,color:'#8855ff'}
      };
    });
  },[]);

  const cancelSiloPlace=useCallback(()=>{
    setGs(prev=>({...prev,siloPlaceMode:false,
      pendingToast:{text:'Torpedo Silo placement cancelled',color:'#555555'}}));
  },[]);

  const openSiloAction=useCallback((r,c)=>{
    setGs(prev=>({...prev,siloActive:{r,c},actionInput:'',actionError:'',actionWarned:null,activeAction:null}));
  },[]);

  const closeSiloAction=useCallback(()=>{
    setGs(prev=>({...prev,siloActive:null,actionInput:'',actionError:'',actionWarned:null}));
  },[]);

  // Phase 1 — arm torpedo: enter target coord, opponent warned, turn spent
  const lockSilo=useCallback(()=>{
    setGs(prev=>{
      if(!prev.siloActive) return prev;
      const coord=parseCoord(prev.actionInput);
      if(!coord) return {...prev,actionError:'Invalid. Use A1–L12'};
      const {row:cr,col:cc}=coord;
      const {r:siloR,c:siloC}=prev.siloActive;
      const who=prev.pvpMode?`p${prev.activePlayer}`:'you';
      const coordStr=`${COLS[cc]}${cr+1}`;
      const msg=`Torpedo armed on ${coordStr}. Opponent warned. Their last move.`;
      // Remove silo tile from grid immediately (it's been fired — waiting to land)
      const newYG=cloneGrid(prev.yourGrid);
      newYG[siloR][siloC]=mkCell('empty');
      return {
        ...prev,
        yourGrid:newYG,
        pendingSilo:{row:cr,col:cc,siloR,siloC,attackerPlayer:prev.activePlayer||0},
        siloActive:null,siloPrepped:null,
        actionInput:'',actionError:'',actionWarned:null,
        actionMessage:msg,
        log:[{who,text:msg},...prev.log],
        turn:prev.aiMode?'ai':'you',

        pendingToast:{text:`Torpedo armed on ${coordStr}. Opponent gets one last move.`,color:'#cc2233'},
      };
    });
  },[]);

  // Phase 2 — fire the locked torpedo
  const confirmSilo=useCallback(()=>{
    setGs(prev=>{
      if(!prev.pendingSilo) return prev;
      const {row:cr,col:cc,siloR,siloC}=prev.pendingSilo;
      let newHit=prev.hitGrid.map(r=>[...r]);
      let newOppGrid=cloneGrid(prev.opponentGrid);
      const hits=[];
      let won=false;
      const centerCell=newOppGrid[cr][cc];
      if(centerCell.type==='territory'||centerCell.type==='starting'){
        newHit[cr][cc]={result:'broken',wasType:'territory'};
        newOppGrid[cr][cc]=mkBroken('territory');
        won=true;
      }
      if(!won){
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
          const tr=cr+dr,tc2=cc+dc;
          if(!inBounds(tr,tc2)) continue;
          const oppCell=newOppGrid[tr][tc2];
          if(oppCell.type==='empty'||oppCell.type==='broken') continue;
          const wasType=
            oppCell.type==='cr'&&!oppCell.collected?'cr':
            oppCell.type==='br'&&!oppCell.collected?'br':
            oppCell.type==='sr_res'&&!oppCell.collected?'sr':
            (oppCell.type==='starting'||oppCell.type==='territory')?'territory':
            oppCell.type==='station'?'station':null;
          if(!wasType) continue;
          newHit[tr][tc2]={result:'broken',wasType};
          newOppGrid[tr][tc2]=mkBroken(wasType);
          hits.push(`${COLS[tc2]}${tr+1}`);
        }
        const ssR2=prev.pvpMode?prev.p2.ssR:prev.opponentSsR;
        const ssC2=prev.pvpMode?prev.p2.ssC:prev.opponentSsC;
        const {grid:prunedOpp,removed:torpPruned}=pruneDisconnected(newOppGrid,ssR2,ssC2);
        newOppGrid=prunedOpp;
        if(torpPruned>0) hits.push(`[+${torpPruned} disconnected]`);
      }
      let newP2=prev.p2;
      if(prev.pvpMode&&prev.p2){
        const newP2YG=cloneGrid(prev.p2.yourGrid);
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(newOppGrid[pr][pc].type==='broken'&&newP2YG[pr][pc].type!=='broken')
            newP2YG[pr][pc]=mkBroken(newOppGrid[pr][pc].wasType);
          if(newOppGrid[pr][pc].type==='empty'&&(newP2YG[pr][pc].type==='territory'||newP2YG[pr][pc].type==='station'))
            newP2YG[pr][pc]=mkCell('empty');
        }
        let p2Terr=0;
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(newP2YG[pr][pc].type==='territory'||newP2YG[pr][pc].type==='starting') p2Terr++;
        }
        newP2={...prev.p2,yourGrid:newP2YG,territory:p2Terr};
      }
      const newYourGrid=cloneGrid(prev.yourGrid);
      newYourGrid[siloR][siloC]=mkCell('empty');
      // Sync aiOwnGrid when player torpedo damages AI territory (AI mode only)
      let newAiOwnGrid=prev.aiOwnGrid;
      if(prev.aiMode){
        newAiOwnGrid=cloneGrid(prev.aiOwnGrid);
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(newOppGrid[pr][pc].type==='broken'||newOppGrid[pr][pc].type==='empty'){
            if(newAiOwnGrid[pr][pc]?.type==='territory'||newAiOwnGrid[pr][pc]?.type==='station')
              newAiOwnGrid[pr][pc]=mkCell('empty');
          }
        }
      }
      const siloBase=`${COLS[siloC]}${siloR+1}`;
      const torpWinner=prev.pvpMode?`p${prev.activePlayer}`:'you';
      const msg=won
        ?`Torpedo from silo at ${siloBase} — direct hit on enemy territory at ${COLS[cc]}${cr+1}! ${prev.pvpMode?`Player ${prev.activePlayer} wins!`:'YOU WIN!'}`
        :`Torpedo from silo at ${siloBase} targeting ${COLS[cc]}${cr+1}! Destroyed: ${hits.length?hits.join(', '):'none'}.`;
      return {...prev,hitGrid:newHit,opponentGrid:newOppGrid,p2:newP2,yourGrid:newYourGrid,aiOwnGrid:newAiOwnGrid,
        pendingSilo:null,siloActive:null,siloPrepped:null,actionInput:'',actionError:'',actionMessage:msg,actionWarned:null,
        gameOver:won,winner:won?torpWinner:prev.winner,
        winReason:won&&prev.pvpMode?`Antimatter Torpedo — direct hit on enemy territory at ${COLS[cc]}${cr+1}!`:prev.winReason,
        log:[{who:prev.pvpMode?`p${prev.activePlayer}`:'you',text:msg},...prev.log],
        turn:prev.aiMode&&!won?'ai':'you',
        pvpPendingPass:prev.pvpMode&&!won,
        pendingToast:{text:won?`Direct Hit on territory ${COLS[cc]}${cr+1}. Opponent territories destroyed: You win!`:msg,color:won?'#44ff44':'#8855ff'}};
    });
  },[]);

  const submitLaser=useCallback(()=>{
    setGs(prev=>{
      const laserItem=prev.inventory.find(i=>i.id==='laser');
      if(!laserItem) return prev;
      const consumeLaser=inv=>inv.filter(i=>i.iid!==laserItem.iid);
      const coord=parseCoord(prev.actionInput);
      if(!coord) return {...prev,actionError:'Invalid. Use A1–L12'};
      const {row,col}=coord;
      const oppCell=prev.opponentGrid[row][col];
      if(oppCell.type==='broken') return {...prev,actionError:`${COLS[col]}${row+1} is already destroyed.`};
      if(oppCell.type==='empty') return {...prev,actionError:`${COLS[col]}${row+1} is empty — nothing to destroy.`};
      const isHome=oppCell.type==='starting';
      if(isHome) return {...prev,actionError:`${COLS[col]}${row+1} — enemy home base is indestructible.`};
      // Determine what was there for display
      const wasType=oppCell.type==='sr_res'?'sr':oppCell.type;
      const newHit=prev.hitGrid.map(r=>[...r]);
      newHit[row][col]={result:'broken',wasType};
      let newOppGrid=cloneGrid(prev.opponentGrid);
      newOppGrid[row][col]=mkBroken(wasType);
      let pruneMsg='';
      if(oppCell.type==='territory'){
        const ssR2=prev.pvpMode?prev.p2.ssR:prev.opponentSsR;
        const ssC2=prev.pvpMode?prev.p2.ssC:prev.opponentSsC;
        const {grid:pruned,removed}=pruneDisconnected(newOppGrid,ssR2,ssC2);
        newOppGrid=pruned;
        if(removed>0) pruneMsg=` +${removed} disconnected tile${removed!==1?'s':''} terminated!`;
      }
      // PvP p2 grid sync
      let newP2=prev.p2;
      if(prev.pvpMode&&prev.p2){
        const newP2YG=cloneGrid(prev.p2.yourGrid);
        newP2YG[row][col]=mkBroken(wasType);
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(newOppGrid[pr][pc].type==='empty'&&newP2YG[pr][pc].type==='territory')
            newP2YG[pr][pc]=mkCell('empty');
        }
        let p2Terr=0;
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(newP2YG[pr][pc].type==='territory'||newP2YG[pr][pc].type==='starting') p2Terr++;
        }
        newP2={...prev.p2,yourGrid:newP2YG,territory:p2Terr};
      }
      // Sync aiOwnGrid when player laser destroys AI territory (AI mode only)
      let newAiOwnGrid=prev.aiOwnGrid;
      if(prev.aiMode){
        newAiOwnGrid=cloneGrid(prev.aiOwnGrid);
        newAiOwnGrid[row][col]=mkCell('empty');
        for(let pr=0;pr<12;pr++) for(let pc=0;pc<12;pc++){
          if(newOppGrid[pr][pc].type==='empty'&&newAiOwnGrid[pr][pc]?.type==='territory')
            newAiOwnGrid[pr][pc]=mkCell('empty');
        }
      }
      const typeLabel={cr:'CR',br:'BR',sr:'SR',territory:'territory tile',station:'station tile'};
      const msg=`Laser: destroyed ${typeLabel[wasType]||'tile'} at ${COLS[col]}${row+1}!${pruneMsg}`;
      const playerBase=`${COLS[prev.ssC]}${prev.ssR+1}`;
      const logMsg=`${msg} (fired from ${playerBase})`;
      return {...prev,hitGrid:newHit,opponentGrid:newOppGrid,p2:newP2,aiOwnGrid:newAiOwnGrid,
        inventory:consumeLaser(prev.inventory),selectedItem:null,
        activeAction:null,actionInput:'',actionError:'',actionMessage:logMsg,actionWarned:null,
        log:[{who:prev.pvpMode?`p${prev.activePlayer}`:'you',text:logMsg},...prev.log],
        turn:prev.aiMode?'ai':'you',
        pvpPendingPass:prev.pvpMode,
        pendingToast:{text:msg,color:'#ff4488'}};
    });
  },[]);

  const dismissAlarm=useCallback(()=>setGs(p=>({...p,detectedAlarm:false})),[]);

  const placeSpy=useCallback((r,c)=>{
    setGs(prev=>{
      if(!prev.spyPlaceMode) return prev;
      if(prev.yourGrid[r][c].type!=='empty') return prev;
      const spyItem=prev.inventory.find(i=>i.id==='spy');
      if(!spyItem) return {...prev,spyPlaceMode:false};
      const newInv=prev.inventory.filter(i=>i.iid!==spyItem.iid);
      const newYG=cloneGrid(prev.yourGrid);
      newYG[r][c]={type:'spy',collected:false,opponentSearched:false};
      const snapData=prev.aiMode?{
        territory:prev.aiTerritory, sr:prev.aiSr,
        inventory:prev.aiInventory.map(i=>({...i})),
        log:prev.log.filter(e=>e.who==='ai').slice(0,20),
      }:prev.pvpMode&&prev.p2?{
        territory:prev.p2.territory, sr:prev.p2.sr,
        inventory:prev.p2.inventory.map(i=>({...i})),
        log:prev.log.filter(e=>e.who===`p${prev.activePlayer===1?2:1}`).slice(0,20),
      }:null;
      // PvP: sync spy tile to p2's opponentGrid so they see it when searching
      let newP2=prev.p2;
      if(prev.pvpMode&&prev.p2){
        const p2Opp=cloneGrid(prev.p2.opponentGrid);
        p2Opp[r][c]={type:'spy',collected:false,opponentSearched:false};
        newP2={...prev.p2,opponentGrid:p2Opp};
      }
      const who=prev.pvpMode?`p${prev.activePlayer}`:'you';
      return {...prev,yourGrid:newYG,p2:newP2,inventory:newInv,selectedItem:null,
        spyPlaceMode:false,
        spy:{r,c,data:snapData,status:'placed'},
        turn:prev.aiMode?'ai':'you',
        pvpPendingPass:prev.pvpMode,
        log:[{who,text:`Spy planted at ${COLS[c]}${r+1} — enemy will see an SR.`},...prev.log],
        pendingToast:{text:`Spy planted at ${COLS[c]}${r+1}! Monitor intel and detonate when ready.`,color:'#1a88cc'}};
    });
  },[]);

  const cancelSpyPlace=useCallback(()=>{
    setGs(prev=>({...prev,spyPlaceMode:false,
      pendingToast:{text:'Spy placement cancelled',color:'#555555'}}));
  },[]);

  const detonateSpy=useCallback(()=>{
    setGs(prev=>{
      if(!prev.spy||prev.spy.status==='used'||prev.spy.status==='detonated') return prev;
      const who=prev.pvpMode?`p${prev.activePlayer}`:'you';
      const coord=`${COLS[prev.spy.c]}${prev.spy.r+1}`;
      if(prev.aiMode){
        return {...prev,
          spy:{...prev.spy,status:'detonated'},
          aiShopDisabledRounds:3, aiInventory:[],
          spyPanelOpen:false,
          log:[{who,text:`Spy detonated at ${coord} — enemy shop locked 3 turns, inventory wiped!`},...prev.log],
          pendingToast:{text:'Spy detonated. Enemy shop locked for 3 turns.',color:'#ff6622'}};
      }
      if(prev.pvpMode&&prev.p2){
        return {...prev,
          spy:{...prev.spy,status:'detonated'},
          p2:{...prev.p2,shopDisabledRounds:3,inventory:[],selectedItem:null},
          spyPanelOpen:false,
          log:[{who,text:`Spy detonated at ${coord} — enemy shop locked 3 turns, inventory wiped!`},...prev.log],
          pendingToast:{text:'Spy detonated. Enemy shop locked for 3 turns.',color:'#ff6622'}};
      }
      return prev;
    });
  },[]);

  const set_=(k,v)=>setGs(p=>({...p,...(typeof k==='string'?{[k]:v}:k)}));
  const openAction=t=>{
    const next=gs.activeAction===t?null:t;
    setGs(p=>({...p,activeAction:next,siloActive:null,actionInput:'',actionError:'',actionMessage:'',actionWarned:null,
      pendingToast:next?{text:`${next==='search'?'Search':'Attack'} mode`,color:'#667788'}:{text:'Action cancelled',color:'#444444'}}));
  };
  const closeAction=()=>set_({activeAction:null,actionInput:'',actionError:'',actionWarned:null,pendingToast:{text:'Action cancelled',color:'#444444'}});
  const onInput=v=>{
    const val=v.toUpperCase();
    const coord=parseCoord(val);
    let autoWarn='';
    if(coord&&gs.activeAction==='search'){
      if(gs.hitGrid[coord.row][coord.col]!==null)
        autoWarn=`${val} already searched — press Go/Enter again to proceed.`;
    }
    if(coord&&gs.activeAction==='attack'){
      const hit=gs.hitGrid[coord.row][coord.col];
      if(hit===null)
        autoWarn=`${val} hasn't been searched yet — search it first.`;
      else if(hit.result!=='territory')
        autoWarn=`${val} shows no territory — can only attack known territory tiles.`;
    }
    setGs(p=>({...p,actionInput:val,actionError:autoWarn,actionWarned:autoWarn?val:null}));
  };
  const onKey=e=>{
    if(e.key==='Enter'){
      if(gs.activeAction==='search') startRadarSearch();
      else if(gs.activeAction==='attack') prepareAttack();
      else if(gs.activeAction==='laser') submitLaser();
      else if(gs.siloActive) lockSilo();
    }
    if(e.key==='Escape'){
      if(gs.siloActive) closeSiloAction();
      else closeAction();
    }
  };

  const vp=gs.placementMode?validPlacements(gs.yourGrid):new Set();
  const vsp=gs.siloPlaceMode?validSiloPositions(gs.yourGrid):new Set();

  // Fog of war: each territory/starting/station tile reveals a 5×5 area on YOUR grid
  const visibleCells=useMemo(()=>{
    const vis=new Set();
    for(let r=0;r<12;r++) for(let c=0;c<12;c++){
      const t=gs.yourGrid[r][c].type;
      if(t==='territory'||t==='starting'||t==='station'){
        for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<12&&nc>=0&&nc<12) vis.add(nr*12+nc);
        }
      }
    }
    return vis;
  },[gs.yourGrid]);


  function renderYour(cell,r,c){
    const key=`${r},${c}`;
    const isValid=gs.placementMode&&vp.has(key);
    const isHovered=gs.placementMode&&hoverCell&&hoverCell.r===r&&hoverCell.c===c;
    const mEnter=gs.placementMode?{onMouseEnter:()=>setHoverCell({r,c})}:{};

    if(gs.spyPlaceMode){
      if(cell.type==='empty') return(
        <div key={c} className="cell c-spy-pick" onClick={()=>placeSpy(r,c)} title={`${COLS[c]}${r+1} — plant spy here`}>
          <span style={{color:'#2299cc',fontSize:14,lineHeight:1}}>⊙</span>
        </div>
      );
    }

    if(gs.siloPlaceMode){
      if(vsp.has(`${r},${c}`)) return(
        <div key={c} className="cell c-silo-pick" onClick={()=>placeSilo(r,c)} title={`${COLS[c]}${r+1} — place torpedo silo here`}>
          <span style={{color:'#aa66ff',fontSize:16,lineHeight:1}}>⊕</span>
        </div>
      );
    }

    if(gs.stationMode){
      if(cell.type==='empty') return(
        <div key={c} className="cell c-station-place" onClick={()=>placeStation(r,c)} title={`${COLS[c]}${r+1} — place station tile here`}>
          <span style={{color:'#009999',fontSize:13,lineHeight:1,opacity:.6}}>◈</span>
        </div>
      );
    }

    if(gs.rerootMode){
      if(cell.type==='territory'||cell.type==='station') return(
        <div key={c} className="cell c-reroot-pick" onClick={()=>applyReroot(r,c)} title={`${COLS[c]}${r+1} — add as extra root`}>
          <span style={{color:'#22cc55',fontSize:14,lineHeight:1}}>★</span>
        </div>
      );
    }

    if(gs.shieldMode&&(cell.type==='territory'||cell.type==='starting'||cell.type==='station')){
      const alreadyShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
      return(
        <div key={c} className="cell" style={{background:'#081828',borderColor:'#2266cc',cursor:alreadyShielded?'not-allowed':'pointer'}}
          onClick={alreadyShielded?undefined:()=>applyShield(r,c)}
          title={alreadyShielded?`${COLS[c]}${r+1} — already shielded`:`${COLS[c]}${r+1} — click to shield`}>
          <span style={{fontSize:13,lineHeight:1}}>{alreadyShielded?'🛡':'🔲'}</span>
        </div>
      );
    }

    // Spy tile always visible to owner — check before hover/valid/fog
    if(cell.type==='spy'){
      const st=gs.spy?.status||'placed';
      const spyColor=st==='detonated'?'#cc4422':st==='found'||st==='used'?'#3377aa':'#2299cc';
      const spyLbl=st==='detonated'?'BOOM':st==='used'?'USED':st==='found'?'FOUND':'SPY';
      return(
        <div key={c} className="cell c-spy" title={`${COLS[c]}${r+1} — Spy Resource (${spyLbl})`} {...mEnter}>
          <span style={{color:spyColor,fontSize:14,lineHeight:1,opacity:st==='detonated'?.4:.8}}>⊙</span>
          <span style={{fontSize:6,color:'rgba(100,180,255,.55)',lineHeight:1,marginTop:1}}>{spyLbl}</span>
        </div>
      );
    }

    if(isHovered){
      return(
        <div key={c} className={`cell ${isValid?'c-ghost-valid':'c-ghost-invalid'}`}
          onClick={isValid?()=>placeTile(r,c):undefined}
          title={`${COLS[c]}${r+1}`} {...mEnter}>
          <span style={{color:isValid?'#ffee00':'#332200',fontSize:20,lineHeight:1}}>◆</span>
        </div>
      );
    }

    if(isValid) return(
      <div key={c} className="cell c-valid" onClick={()=>placeTile(r,c)} title={`${COLS[c]}${r+1}`} {...mEnter}/>
    );

    if(!visibleCells.has(r*12+c)){
      return <div key={c} className="cell c-fog" title={`${COLS[c]}${r+1}`} {...mEnter}/>;
    }

    let cls='cell ';
    let inner=null;
    switch(cell.type){
      case 'starting': {
        const sShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
        cls+='c-starting';
        inner=<><span className="cell-icon" style={{color:'#ffe066',fontSize:15}}>★</span>{sShielded&&<span style={{fontSize:7,position:'absolute',bottom:1,right:2,color:'#55aaff'}}>🛡</span>}</>;
        break;
      }
      case 'territory': {
        const tShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
        cls+='c-territory';
        inner=tShielded?<span style={{fontSize:10,color:'#55aaff',lineHeight:1}}>🛡</span>:null;
        break;
      }
      case 'cr':
        cls+='c-cr'+(cell.collected?' done':'');
        inner=cell.collected
          ?<span style={{color:'#1a3a1a',fontSize:13}}>✕</span>
          :<span className="cell-icon" style={{color:'#33aa33'}}>◆</span>;
        break;
      case 'br':
        cls+='c-br'+(cell.collected?' done':'');
        inner=cell.collected
          ?<span style={{color:'#3a1a1a',fontSize:13}}>✕</span>
          :<span className="cell-icon" style={{color:'#cc3333'}}>◆</span>;
        break;
      case 'sr_res':
        cls+='c-srr'+(cell.collected?' done':'');
        inner=cell.collected
          ?<span style={{color:'#1a1a3a',fontSize:13}}>✕</span>
          :<span className="cell-icon" style={{color:'#3333cc'}}>◆</span>;
        break;
      case 'station': {
        const stShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
        cls+='c-station';
        inner=stShielded
          ?<span style={{fontSize:10,color:'#55aaff',lineHeight:1}}>🛡</span>
          :<span style={{color:'#00cccc',fontSize:13,lineHeight:1}}>◈</span>;
        break;
      }
      case 'silo': {
        const isActiveSilo=gs.siloActive&&gs.siloActive.r===r&&gs.siloActive.c===c;
        const isPrepped=gs.siloPrepped?.r===r&&gs.siloPrepped?.c===c;
        const siloCls=`cell ${isPrepped?'c-silo-prepped':'c-silo'}${isActiveSilo?' c-station-sel':''}`;
        const siloColor=isPrepped?'#ff4455':isActiveSilo?'#cc88ff':'#aa66ff';
        const siloLbl=isPrepped?'ARMED':'SILO';
        const siloTitle=`${COLS[c]}${r+1} — Torpedo Silo${isPrepped?' (ARMED — click to fire)':isActiveSilo?' (select action…)':(gs.siloPlaceMode?'':' — click to prepare')}`;
        return(
          <div key={c} className={siloCls}
            onClick={()=>!gs.siloPlaceMode&&openSiloAction(r,c)}
            title={siloTitle} {...mEnter}>
            <span style={{color:siloColor,fontSize:14,lineHeight:1}}>⊕</span>
            <span style={{fontSize:6,color:isPrepped?'rgba(255,80,90,.8)':'rgba(180,130,255,.65)',lineHeight:1,marginTop:1}}>{siloLbl}</span>
          </div>
        );
      }
      case 'broken': {
        const bMeta={cr:{color:'#33aa33',label:'CR'},br:{color:'#aa3333',label:'BR'},sr:{color:'#3333aa',label:'SR'},territory:{color:'#888844',label:'Terr.'},station:{color:'#008877',label:'Stn.'}}[cell.wasType]||{};
        const {color:bxc='#555',label:blbl='?'}=bMeta;
        return(
          <div key={c} className="cell c-broken" title={`${COLS[c]}${r+1} — destroyed`} {...mEnter}>
            <span style={{color:bxc,fontSize:15,lineHeight:1,opacity:.5}}>✕</span>
            <span style={{fontSize:6,color:'rgba(255,255,255,.3)',lineHeight:1,marginTop:1}}>{blbl}</span>
          </div>
        );
      }
      default:
        cls+='c-empty';
    }
    return <div key={c} className={cls} title={`${COLS[c]}${r+1}`} {...mEnter}>{inner}</div>;
  }

  function renderHit(cell,r,c){
    // Show red ! if opponent has a prepped silo at this position
    const oppSiloPrep=gs.pvpMode?gs.p2?.siloPrepped:null;
    const isSiloWarn=oppSiloPrep&&oppSiloPrep.r===r&&oppSiloPrep.c===c;
    const warnClass=isSiloWarn?' c-hit-silo-warn':'';

    if(!cell) return <div key={c} className={`cell c-hit-blank${warnClass}`} title={`${COLS[c]}${r+1}${isSiloWarn?' — ⚠ Enemy torpedo silo!':''}`}/>;
    if(cell.result==='miss') return(
      <div key={c} className={`cell c-hit-miss${warnClass}`} title={`${COLS[c]}${r+1} — Miss${isSiloWarn?' ⚠ Enemy torpedo silo!':''}`}>
        <span style={{color:'#ddbb00',fontSize:16,lineHeight:1,fontWeight:'bold',textShadow:'0 0 6px rgba(220,180,0,.6)'}}>×</span>
      </div>
    );
    if(cell.result==='broken'){
      const wasMap={
        cr:       {cls:'c-hit-cr',  xc:'#33aa33', lbl:'CR'},
        br:       {cls:'c-hit-br',  xc:'#aa3333', lbl:'BR'},
        sr:       {cls:'c-hit-sr',  xc:'#3333aa', lbl:'SR'},
        territory:{cls:'c-hit-ter', xc:'#aaaa22', lbl:'Terr.'},
        station:  {cls:'c-hit-ter', xc:'#009988', lbl:'Stn.'},
      };
      const {cls,xc,lbl}=wasMap[cell.wasType]||{cls:'c-hit-miss',xc:'#555',lbl:'?'};
      return(
        <div key={c} className={`cell ${cls} c-hit-broken${warnClass}`} title={`${COLS[c]}${r+1} — destroyed`}>
          <span style={{color:xc,fontSize:15,lineHeight:1,opacity:.55}}>✕</span>
          <span style={{fontSize:6,color:'rgba(255,255,255,.35)',lineHeight:1,marginTop:1}}>{lbl}</span>
        </div>
      );
    }
    const map={
      cr:       {cls:'c-hit-cr',  xc:'#44cc44', lbl:'CR'},
      br:       {cls:'c-hit-br',  xc:'#cc4444', lbl:'BR'},
      sr:       {cls:'c-hit-sr',  xc:'#4444cc', lbl:'SR'},
      territory:{cls:'c-hit-ter', xc:'#ccaa22', lbl:'Terr.'},
      station:  {cls:'c-hit-ter', xc:'#00aacc', lbl:'Stn.'},
    };
    const {cls,xc,lbl}=map[cell.result]||{cls:'c-hit-miss',xc:'#444',lbl:''};
    return(
      <div key={c} className={`cell ${cls}${warnClass}`} title={`${COLS[c]}${r+1}${isSiloWarn?' — ⚠ Enemy torpedo silo!':''}`}>
        <span style={{color:xc,fontSize:18,lineHeight:1}}>◆</span>
        <span style={{fontSize:7,color:'rgba(255,255,255,.5)',lineHeight:1,marginTop:1}}>{lbl}</span>
      </div>
    );
  }


  // Read-only full-reveal renderer for spectate mode (opponent's actual grid)
  function renderSpectateOpp(cell,r,c){
    if(!cell||cell.type==='empty') return <div key={c} className="cell c-empty" title={`${COLS[c]}${r+1}`}/>;
    let cls='cell '; let inner=null;
    switch(cell.type){
      case 'starting': cls+='c-starting'; inner=<span className="cell-icon" style={{color:'#ffe066',fontSize:15}}>★</span>; break;
      case 'territory': cls+='c-territory'; break;
      case 'cr': cls+='c-cr'+(cell.collected?' done':''); inner=cell.collected?<span style={{color:'#1a3a1a',fontSize:13}}>✕</span>:<span className="cell-icon" style={{color:'#33aa33'}}>◆</span>; break;
      case 'br': cls+='c-br'+(cell.collected?' done':''); inner=cell.collected?<span style={{color:'#3a1a1a',fontSize:13}}>✕</span>:<span className="cell-icon" style={{color:'#cc3333'}}>◆</span>; break;
      case 'sr_res': cls+='c-srr'+(cell.collected?' done':''); inner=cell.collected?<span style={{color:'#1a1a3a',fontSize:13}}>✕</span>:<span className="cell-icon" style={{color:'#3333cc'}}>◆</span>; break;
      case 'station': cls+='c-station'; inner=<span style={{color:'#00cccc',fontSize:13,lineHeight:1}}>◈</span>; break;
      case 'silo': cls+='c-silo'; inner=<><span style={{color:'#aa66ff',fontSize:14,lineHeight:1}}>⊕</span><span style={{fontSize:6,color:'rgba(180,130,255,.65)',lineHeight:1,marginTop:1}}>SILO</span></>; break;
      case 'spy': cls+='c-spy'; inner=<><span style={{color:'#2299cc',fontSize:14,lineHeight:1}}>⊙</span><span style={{fontSize:6,color:'rgba(100,180,255,.55)',lineHeight:1,marginTop:1}}>SPY</span></>; break;
      case 'broken': cls+='c-broken'; break;
      default: cls+='c-empty';
    }
    return <div key={c} className={cls} title={`${COLS[c]}${r+1} — ${cell.type}`}>{inner}</div>;
  }

  const selInvItem=gs.inventory.find(i=>i.iid===gs.selectedItem);

  if(phase==='loading') return(
    <div className="loading-screen">
      <div className="start-title" style={{fontSize:32,letterSpacing:6}}>It's Just Logic</div>
      <div style={{fontSize:12,color:'#888',letterSpacing:4,textTransform:'uppercase'}}>Loading…</div>
    </div>
  );

  if(phase==='difficulty') return(
    <div className="start-screen">
      <div className="start-corner start-corner-tl"/>
      <div className="start-corner start-corner-tr"/>
      <div className="start-corner start-corner-bl"/>
      <div className="start-corner start-corner-br"/>
      <div className="start-title">It's Just Logic</div>
      <div style={{display:'flex',flexDirection:'column',gap:'10px',alignItems:'center'}}>
        <button className="btn-start" onClick={()=>chooseAi('easy')}>BOT Lyra <span style={{fontSize:11,opacity:0.6}}>Easy</span></button>
        <button className="btn-start" onClick={()=>chooseAi('medium')}>BOT Cassiopeia <span style={{fontSize:11,opacity:0.6}}>Medium</span></button>
        <button className="btn-start" onClick={()=>chooseAi('hard')}>BOT Orion <span style={{fontSize:11,opacity:0.6}}>Hard</span></button>
        <button style={{marginTop:4,fontSize:11,color:'#888',background:'none',border:'none',cursor:'pointer',letterSpacing:2,textTransform:'uppercase',fontFamily:'inherit'}} onClick={()=>setPhase('start')}>← Back</button>
      </div>
    </div>
  );

  if(phase==='start') return(
    <div className="start-screen">
      <div className="start-corner start-corner-tl"/>
      <div className="start-corner start-corner-tr"/>
      <div className="start-corner start-corner-bl"/>
      <div className="start-corner start-corner-br"/>
      <div style={{position:'absolute',bottom:24,right:'50%',transform:'translateX(50%)',fontSize:10,color:'rgba(110,140,80,.65)',letterSpacing:3,fontFamily:'Courier New,monospace',userSelect:'none'}}>V.0.2.0</div>
      <div className="start-title">It's Just Logic</div>
      <div style={{display:'flex',flexDirection:'column',gap:'10px',alignItems:'center'}}>
        <button className="btn-start" onClick={()=>startGame(false)}>Start 1v0</button>
        <button className="btn-start" onClick={startPvp}>1v1</button>
        <button className="btn-start" onClick={()=>setPhase('difficulty')}>1 v BOT</button>
      </div>
    </div>
  );

  if(pvpLoading) return(
    <div className="loading-screen">
      <div className="start-title" style={{fontSize:28,letterSpacing:6}}>Pass the Device</div>
      <div style={{fontSize:72,fontWeight:'bold',color:'#8888ff',lineHeight:1}}>{pvpCountdown}</div>
      <div style={{fontSize:11,color:'#888',letterSpacing:4,textTransform:'uppercase'}}>Player {gs.activePlayer===1?2:1} — get ready</div>
    </div>
  );

  return(
    <div className="app" style={spectateMode?{paddingTop:36,pointerEvents:'none'}:{}}>
      {sfxLabel&&<div style={{position:'fixed',bottom:10,right:14,fontSize:9,color:'rgba(90,160,60,0.55)',letterSpacing:3,fontFamily:'Courier New,monospace',pointerEvents:'none',userSelect:'none',zIndex:9999,textTransform:'uppercase'}}>{sfxLabel}</div>}
      <div className="main">

        {/* LEFT — GRID */}
        <div className="grid-area">
          <div className="grid-controls">
            <span className="view-title">
              {spectateMode?(spectateViewOpp?"OPPONENT'S BOARD":'YOUR BOARD'):gs.viewMode==='your'?'YOUR GRID':"OPPONENT'S GRID"}
            </span>
            {!spectateMode&&<>
            <button className={`btn btn-view${gs.viewMode==='your'?' on':''}`}
              onClick={()=>set_({viewMode:'your',pendingToast:{text:'Viewing your grid',color:'#557799'}})}>Your Grid</button>
            <button className={`btn btn-view${gs.viewMode==='hit'?' on':''}`}
              onClick={()=>set_({viewMode:'hit',pendingToast:{text:"Viewing opponent's grid",color:'#557799'}})}>Opponent's Grid</button>
            </>}
          </div>

          <div className="grid-scroll-wrap">
            <div className="grid-scroll" onMouseLeave={()=>gs.placementMode&&setHoverCell(null)}>
              <div style={{position:'relative',display:'inline-block'}}>
                <div className="grid-wrap">
                  <div className="col-labels">
                    {COLS.map(l=><div key={l} className="col-lbl">{l}</div>)}
                  </div>
                  {Array.from({length:12},(_,r)=>(
                    <div key={r} className="grid-row">
                      <div className="row-lbl">{r+1}</div>
                      {Array.from({length:12},(_,c)=>{
                        if(spectateMode&&spectateViewOpp){
                          const oppGrid=gs.pvpMode&&gs.p2?gs.p2.yourGrid:gs.opponentGrid;
                          return renderSpectateOpp(oppGrid[r][c],r,c);
                        }
                        // In spectate-your-board mode always show your grid (toggle buttons are hidden)
                        return (spectateMode||gs.viewMode==='your')
                          ?renderYour(gs.yourGrid[r][c],r,c)
                          :renderHit(gs.hitGrid[r][c],r,c);
                      })}
                    </div>
                  ))}
                </div>
                {radarCell&&(
                  <div className="grid-radar-overlay">
                    <div className="grid-radar-sweep"/>
                    <div className="grid-radar-ring-mid"/>
                    <div className="grid-radar-ring-inner"/>
                    <div className="grid-radar-cross-h"/>
                    <div className="grid-radar-cross-v"/>
                    <div className="grid-radar-border"/>
                    <div className="grid-radar-info">
                      <div className="grid-radar-coord">{COLS[radarCell.c]}{radarCell.r+1}</div>
                      {radarRevealed
                        ? <div style={{fontSize:12,fontWeight:'bold',letterSpacing:2,color:radarCell.previewColor,textShadow:`0 0 10px ${radarCell.previewColor}`}}>{radarCell.preview}</div>
                        : <div className="grid-radar-scanning">Scanning…</div>}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>

        {/* MID PANEL */}
        <div className="mid">
          <div className="mid-head">History</div>
          <div className="log-list">
            {gs.log.length===0
              ?<div className="log-empty">No moves yet</div>
              :gs.log.map((entry,i)=>(
                <div key={i} className={`log-entry ${entry.who==='you'||entry.who==='p1'?'log-you':entry.who==='p2'?'log-p2':'log-opp'}`}>
                  <span className="log-who">{entry.who==='you'?'YOU':entry.who==='p1'?'P1':entry.who==='p2'?'P2':botName(gs.aiDifficulty)}</span>
                  {entry.who==='ai'?'made a move.':entry.text}
                </div>
              ))
            }
          </div>
          <div className="notes-wrap">
            <div className="mid-head">Notes</div>
            <textarea className="notes-inp"
              value={notes}
              onChange={e=>setNotes(e.target.value)}
              placeholder="Write notes here…"/>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div className="right">
          {spectateMode&&spectateViewOpp&&(
            <div style={{fontSize:9,color:'#334433',letterSpacing:2,textTransform:'uppercase',marginBottom:4,textAlign:'center'}}>Opponent Stats</div>
          )}
          <div className="stat-card">
            <div className="stat-name">Territory</div>
            <div className={`stat-val sv-ter`}>
              {spectateMode&&spectateViewOpp
                ?(gs.pvpMode&&gs.p2?gs.p2.territory:gs.aiTerritory)
                :gs.territory}
            </div>
          </div>
          <div className="stat-card">
            <div className="stat-name">SR</div>
            <div className={`stat-val sv-sr`}>
              {spectateMode&&spectateViewOpp
                ?(gs.pvpMode&&gs.p2?gs.p2.sr:gs.aiSr)
                :gs.sr}
            </div>
          </div>

          {!spectateMode&&<div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <button className="btn btn-shop" style={{flex:1}} onClick={()=>set_({shopOpen:true,pendingToast:{text:'Shop opened',color:'#aaaa44'}})}>⬡ SHOP</button>
            {gs.spy&&<button className="btn" style={{flex:1,borderColor:'#1a5577',color:'#3399cc',background:'#081420',fontSize:11}}
              onClick={()=>setGs(p=>({...p,spyPanelOpen:!p.spyPanelOpen}))}>⊙ Intel</button>}
          </div>}
          {!spectateMode&&gs.shopDisabledRounds>0&&(
            <div style={{fontSize:10,color:'#ff5544',background:'#1a0808',border:'1px solid #551111',borderRadius:4,padding:'4px 8px',textAlign:'center'}}>
              ⚠ Shop locked by spy — {gs.shopDisabledRounds} turn{gs.shopDisabledRounds!==1?'s':''} left
            </div>
          )}

          <div>
            <div className="sec-head">Inventory</div>
            {(()=>{const inv=spectateMode&&spectateViewOpp?(gs.pvpMode&&gs.p2?gs.p2.inventory:gs.aiInventory):gs.inventory;
              return inv.length===0
              ?<div className="inv-empty">No items owned</div>
              :inv.map(item=>(
                <div key={item.iid} className={`inv-item${!spectateMode&&gs.selectedItem===item.iid?' sel':''}`}>
                  <span className="inv-name">{item.name}</span>
                  {!spectateMode&&<div style={{display:'flex',gap:3,alignItems:'center'}}>
                    <button className={`btn btn-sel${gs.selectedItem===item.iid?' on':''}`}
                      onClick={()=>selectItem(item.iid)}>
                      {gs.selectedItem===item.iid?'●':'○'}
                    </button>
                    <button className="btn btn-go" style={{padding:'2px 8px',fontSize:10,letterSpacing:1,opacity:gs.aiMode&&gs.turn==='ai'?0.35:1}}
                      disabled={gs.aiMode&&gs.turn==='ai'}
                      onClick={()=>useItem(item.iid)}>Use</button>
                  </div>}
                </div>
              ));})()}
          </div>

        </div>
      </div>

      {/* BOTTOM BAR */}
      <div className="bottom">
        {spectateMode&&(
          <div style={{fontSize:10,color:'#2a3a2a',letterSpacing:3,textTransform:'uppercase',textAlign:'center',padding:'4px 0'}}>
            — spectating — read only —
          </div>
        )}
        {!spectateMode&&gs.placementMode&&(
          <div className="place-banner">
            Place territory: {gs.placementRemaining} remaining — click a highlighted square
          </div>
        )}
        {!spectateMode&&selInvItem&&!gs.stationMode&&!gs.siloPlaceMode&&!gs.spyPlaceMode&&!gs.activeAction&&(
          <div className="sel-banner" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
            <span style={{fontSize:11}}>
              {selInvItem.name} — {
                selInvItem.id==='emp'?'stuns BOT Orion for 1 turn; you get a bonus move.':
                selInvItem.id==='shield'?'click a territory tile on your grid to protect it.':
                selInvItem.id==='station'?`place 1 station tile anywhere on your grid (${countStation(gs.yourGrid)}/7 tiles used).`:
                selInvItem.id==='addroot'?'add an extra root to any territory or station tile.':
                selInvItem.id==='pirates'?'steal 1 territory tile from opponent.':
                selInvItem.id==='laser'?'destroy any tile on opponent\'s grid.':
                selInvItem.id==='torpedo'?'place a torpedo silo adjacent to your territory.':
                selInvItem.id==='spy'?'plant a decoy SR tile anywhere on your grid.':
                'choose a target.'
              }
            </span>
            <button className="btn btn-go" style={{padding:'4px 14px',fontSize:12}} onClick={useItem}>Use</button>
          </div>
        )}
        {!spectateMode&&gs.stationMode&&(
          <div className="place-banner" style={{borderColor:'#009999',color:'#00cccc',display:'flex',alignItems:'center',gap:10}}>
            <span>Space Station: click any empty cell to place a station tile (station: {countStation(gs.yourGrid)}/7)</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelStation}>Cancel</button>
          </div>
        )}
        {!spectateMode&&gs.siloPlaceMode&&(
          <div className="place-banner" style={{borderColor:'#7733cc',color:'#aa66ff',display:'flex',alignItems:'center',gap:10}}>
            <span>Torpedo Silo: click a highlighted cell adjacent to your territory to place</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelSiloPlace}>Cancel</button>
          </div>
        )}
        {!spectateMode&&gs.spyPlaceMode&&(
          <div className="place-banner" style={{borderColor:'#1a6699',color:'#3399cc',display:'flex',alignItems:'center',gap:10}}>
            <span>Spy Resource: click any empty cell on your grid — enemy will see an SR there</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelSpyPlace}>Cancel</button>
          </div>
        )}
        {!spectateMode&&gs.rerootMode&&(
          <div className="place-banner" style={{borderColor:'#22aa55',color:'#44cc77',display:'flex',alignItems:'center',gap:10}}>
            <span>Add Root: click any territory or station tile to add it as an extra root</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelReroot}>Cancel</button>
          </div>
        )}
        {!spectateMode&&gs.shieldMode&&(
          <div className="place-banner" style={{borderColor:'#2266cc',color:'#55aaff',display:'flex',alignItems:'center',gap:10}}>
            <span>Shield: click a territory tile on your grid to protect it</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelShield}>Cancel</button>
          </div>
        )}
        {!spectateMode&&gs.actionMessage&&!gs.activeAction&&(
          <div className="msg-txt">{gs.actionMessage}</div>
        )}
        {!spectateMode&&gs.detectedAlarm&&gs.turn==='you'&&!gs.gameOver&&(
          <div className="alarm-banner">
            <span style={{fontSize:16,lineHeight:1}}>⚠</span>
            <span>TERRITORY DETECTED. The enemy has located your territory.</span>
            <button className="alarm-x" onClick={dismissAlarm}>✕</button>
          </div>
        )}
        {/* Incoming attack warning — shown to the defender in PvP */}
        {!spectateMode&&gs.pvpMode&&gs.pendingAttack&&gs.pendingAttack.attackerPlayer!==gs.activePlayer&&!gs.gameOver&&(
          <div className="alarm-banner" style={{borderColor:'#cc4422',background:'#180604',animation:'alarm-pulse 1s ease infinite'}}>
            <span style={{color:'#ff6644',fontWeight:'bold'}}>
              INCOMING ATTACK — Player {gs.pendingAttack.attackerPlayer} is striking {COLS[gs.pendingAttack.col]}{gs.pendingAttack.row+1}! This is your last move.
            </span>
          </div>
        )}
        {/* Incoming attack warning — shown to player during AI's last move (1vBot) */}
        {!spectateMode&&gs.aiMode&&gs.pendingAttack&&gs.turn==='ai'&&!gs.gameOver&&(
          <div style={{padding:'5px 14px',fontSize:11,color:'#cc6622',background:'rgba(30,12,4,0.9)',
            border:'1px solid #442211',borderRadius:4,letterSpacing:1}}>
            ⏳ Attack locked on {COLS[gs.pendingAttack.col]}{gs.pendingAttack.row+1} — {botName(gs.aiDifficulty)} takes their last move…
          </div>
        )}
        {/* Decoy fake attack banner — PvP victim (they don't know it's fake) */}
        {!spectateMode&&gs.pvpMode&&gs.pendingDecoy&&gs.pendingDecoy.attackerPlayer!==gs.activePlayer&&!gs.gameOver&&(
          <div className="alarm-banner" style={{borderColor:'#886600',background:'#141000',animation:'alarm-pulse 1s ease infinite'}}>
            <span style={{color:'#ffcc00',fontWeight:'bold'}}>
              ⚠ INCOMING ATTACK — from {gs.pendingDecoy.from} targeting {gs.pendingDecoy.to}! Make your move.
            </span>
          </div>
        )}
        {/* Decoy — AI mode: show player that AI is reacting to fake signal */}
        {!spectateMode&&gs.aiMode&&gs.pendingDecoy&&gs.turn==='ai'&&!gs.gameOver&&(
          <div style={{padding:'5px 14px',fontSize:11,color:'#aaaa22',background:'rgba(20,18,4,0.9)',
            border:'1px solid #554400',borderRadius:4,letterSpacing:1}}>
            {botName(gs.aiDifficulty)} is reacting to the fake attack signal…
          </div>
        )}
        {/* Incoming torpedo warning — PvP defender */}
        {!spectateMode&&gs.pvpMode&&gs.pendingSilo&&gs.pendingSilo.attackerPlayer!==gs.activePlayer&&!gs.gameOver&&(
          <div className="alarm-banner" style={{borderColor:'#882233',background:'#150406',animation:'alarm-pulse 1s ease infinite'}}>
            <span style={{color:'#ff4455',fontWeight:'bold'}}>
              INCOMING TORPEDO — Player {gs.pendingSilo.attackerPlayer} locked on {COLS[gs.pendingSilo.col]}{gs.pendingSilo.row+1}! This is your last move.
            </span>
          </div>
        )}
        {/* Incoming torpedo warning — 1vBot waiting for AI last move (player torpedo) */}
        {!spectateMode&&gs.aiMode&&gs.pendingSilo&&gs.turn==='ai'&&!gs.gameOver&&(
          <div style={{padding:'5px 14px',fontSize:11,color:'#cc2233',background:'rgba(25,4,8,0.9)',
            border:'1px solid #551122',borderRadius:4,letterSpacing:1}}>
            Torpedo armed on {COLS[gs.pendingSilo.col]}{gs.pendingSilo.row+1}. {botName(gs.aiDifficulty)} takes their last move…
          </div>
        )}
        {/* AI torpedo warning — shown to player during their last move */}
        {!spectateMode&&gs.aiMode&&gs.pendingAiTorpedo&&gs.turn==='you'&&!gs.gameOver&&(
          <div className="alarm-banner" style={{borderColor:'#882233',background:'#150406',animation:'alarm-pulse 1s ease infinite'}}>
            <span style={{color:'#ff4455',fontWeight:'bold'}}>
              INCOMING TORPEDO — {botName(gs.aiDifficulty)} locked on {COLS[gs.pendingAiTorpedo.col]}{gs.pendingAiTorpedo.row+1}! This is your last move.
            </span>
          </div>
        )}
        {/* AI torpedo — waiting indicator during AI's fire turn */}
        {!spectateMode&&gs.aiMode&&gs.pendingAiTorpedo&&gs.turn==='ai'&&!gs.gameOver&&(
          <div style={{padding:'5px 14px',fontSize:11,color:'#cc2233',background:'rgba(25,4,8,0.9)',
            border:'1px solid #551122',borderRadius:4,letterSpacing:1}}>
            Torpedo incoming at {COLS[gs.pendingAiTorpedo.col]}{gs.pendingAiTorpedo.row+1}…
          </div>
        )}
        {/* AI attack warning — shown to player during their last move */}
        {!spectateMode&&gs.aiMode&&gs.pendingAiAttack&&gs.turn==='you'&&!gs.gameOver&&(
          <div className="alarm-banner" style={{borderColor:'#cc4422',background:'#180604',animation:'alarm-pulse 1s ease infinite'}}>
            <span style={{color:'#ff6644',fontWeight:'bold'}}>
              INCOMING ATTACK — {botName(gs.aiDifficulty)} targeting {COLS[gs.pendingAiAttack.col]}{gs.pendingAiAttack.row+1}! This is your last move.
            </span>
          </div>
        )}
        {/* AI attack — waiting indicator during AI's strike turn */}
        {!spectateMode&&gs.aiMode&&gs.pendingAiAttack&&gs.turn==='ai'&&!gs.gameOver&&(
          <div style={{padding:'5px 14px',fontSize:11,color:'#cc6622',background:'rgba(30,12,4,0.9)',
            border:'1px solid #442211',borderRadius:4,letterSpacing:1}}>
            Attack incoming at {COLS[gs.pendingAiAttack.col]}{gs.pendingAiAttack.row+1}…
          </div>
        )}
        {!spectateMode&&<div className="bottom-row">
          {gs.pvpMode&&<span style={{fontSize:'10px',color:'#8888aa',letterSpacing:'1px',textTransform:'uppercase'}}>Player {gs.activePlayer}'s Turn</span>}
          {gs.aiMode&&<span style={{fontSize:'10px',color:'#444',letterSpacing:'1px',textTransform:'uppercase'}}>{botName(gs.aiDifficulty)}</span>}
          {gs.aiMode&&gs.turn==='ai'&&!gs.pendingAttack&&!gs.pendingSilo&&!gs.pendingAiTorpedo&&!gs.pendingAiAttack&&(
            <span className="msg-txt" style={{color:'#dd8866'}}>{botName(gs.aiDifficulty)} is thinking…</span>
          )}
          {phase==='game'&&gs.turn==='you'&&!gs.gameOver&&!gs.pvpMode&&(
            <span style={{fontSize:13,fontWeight:'bold',fontVariantNumeric:'tabular-nums',
              color:timeLeft<=10?'#cc4444':timeLeft<=30?'#ffaa00':'#556677',
              border:'1px solid',borderColor:timeLeft<=10?'#441111':timeLeft<=30?'#443300':'#1a2233',
              borderRadius:4,padding:'2px 8px',background:'#080810'}}>
              {Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}
            </span>
          )}
          {gs.pvpMode&&gs.pvpPendingPass&&!gs.gameOver&&(
            <button className="btn-start" style={{fontSize:13,padding:'8px 28px'}} onClick={passPvp}>Pass Device →</button>
          )}
          {/* Confirm Attack — shown to the attacker on their next turn */}
          {!gs.pvpPendingPass&&gs.turn==='you'&&gs.pendingAttack&&
           (!gs.pvpMode||(gs.pvpMode&&gs.pendingAttack.attackerPlayer===gs.activePlayer))&&!gs.gameOver&&(
            <>
              <span style={{fontSize:10,color:'#cc6622',letterSpacing:2,textTransform:'uppercase',fontWeight:'bold'}}>
                {COLS[gs.pendingAttack.col]}{gs.pendingAttack.row+1}
              </span>
              <button className="btn btn-attack" style={{background:'#2a0a04',borderColor:'#cc3322',color:'#ff5533',fontWeight:'bold',padding:'5px 18px',letterSpacing:1}}
                onClick={confirmAttack}>Confirm Attack</button>
              <button className="btn btn-cancel" style={{fontSize:11,padding:'5px 10px'}}
                onClick={()=>setGs(p=>({...p,pendingAttack:null,activeAction:null,actionInput:'',
                  actionMessage:'Attack cancelled.',
                  turn:p.aiMode?'ai':'you',
                  pvpPendingPass:p.pvpMode,
                  pendingToast:{text:'Attack cancelled.',color:'#555555'}}))}>Cancel</button>
            </>
          )}
          {/* Confirm Launch — shown to torpedo attacker on their next turn */}
          {!gs.pvpPendingPass&&gs.turn==='you'&&gs.pendingSilo&&
           (!gs.pvpMode||(gs.pvpMode&&gs.pendingSilo.attackerPlayer===gs.activePlayer))&&!gs.gameOver&&(
            <>
              <span style={{fontSize:10,color:'#cc2233',letterSpacing:2,textTransform:'uppercase',fontWeight:'bold'}}>
                Torpedo: {COLS[gs.pendingSilo.col]}{gs.pendingSilo.row+1}
              </span>
              <button className="btn btn-attack" style={{background:'#200408',borderColor:'#882233',color:'#ff3344',fontWeight:'bold',padding:'5px 18px',letterSpacing:1}}
                onClick={confirmSilo}>Fire Torpedo</button>
              <button className="btn btn-cancel" style={{fontSize:11,padding:'5px 10px'}}
                onClick={()=>setGs(p=>({...p,pendingSilo:null,activeAction:null,actionInput:'',
                  actionMessage:'Torpedo cancelled.',
                  turn:p.aiMode?'ai':'you',
                  pvpPendingPass:p.pvpMode,
                  pendingToast:{text:'Torpedo cancelled.',color:'#555555'}}))}>Cancel</button>
            </>
          )}
          {/* Search: hide only when it's YOUR OWN pending action to confirm, not when you're the defender */}
          {!gs.pvpPendingPass&&
           !(gs.pendingAttack&&(!gs.pvpMode||gs.pendingAttack.attackerPlayer===gs.activePlayer))&&
           !(gs.pendingSilo&&(!gs.pvpMode||gs.pendingSilo.attackerPlayer===gs.activePlayer))&&
           gs.viewMode==='hit'&&gs.turn==='you'&&(
            <button className={`btn btn-search${gs.activeAction==='search'?' btn-view on':''}`}
              onClick={()=>openAction('search')}>Search</button>
          )}
          {/* Attack: hide whenever ANY pending action exists (prevents overwriting) */}
          {!gs.pvpPendingPass&&!gs.pendingAttack&&!gs.pendingSilo&&gs.viewMode==='hit'&&gs.turn==='you'&&(
            <button className={`btn btn-attack${gs.activeAction==='attack'?' btn-view on':''}`}
              onClick={()=>openAction('attack')}>Attack</button>
          )}
          {!gs.aiMode&&!gs.pvpMode&&<>
            <button className="btn" style={{background:'#081808',borderColor:'#1a4a1a',color:'#44cc44',fontSize:11,padding:'5px 10px'}}
              onClick={()=>setGs(prev=>({...prev,placementMode:true,placementRemaining:(prev.placementRemaining||0)+1,actionMessage:'Cheat: place 1 territory tile.'}))}>
              +1 CR
            </button>
            <button className="btn" style={{background:'#08081e',borderColor:'#1a1a44',color:'#8888ff',fontSize:11,padding:'5px 10px'}}
              onClick={()=>setGs(prev=>({...prev,sr:prev.sr+1}))}>
              +1 SR
            </button>
            <button className="btn" style={{background:'#080c14',borderColor:'#1a3344',color:'#4488aa',fontSize:10,padding:'4px 10px',letterSpacing:1}}
              title="Play all 7 sound effects in sequence (~7s)"
              onClick={playAllSfx}>
              ♪ SFX
            </button>
          </>}

          {!gs.pvpPendingPass&&gs.activeAction&&gs.turn==='you'&&(<>
            <div className="action-form">
              <span className="action-lbl">
                {gs.activeAction==='search'?'Search':gs.activeAction==='attack'?'Attack':'Laser'}
              </span>
              <input ref={inputRef} className="coord-inp"
                value={gs.actionInput}
                onChange={e=>onInput(e.target.value)}
                onKeyDown={onKey}
                placeholder="D4" maxLength={3}/>
            </div>
            <button className="btn btn-go" disabled={!!radarCell}
              onClick={gs.activeAction==='search'?startRadarSearch:gs.activeAction==='attack'?prepareAttack:submitLaser}>Go</button>
            <button className="btn btn-cancel" onClick={closeAction}>✕</button>
            {gs.actionError&&<span className="err-txt">{gs.actionError}</span>}
          </>)}
          {gs.siloActive&&!gs.activeAction&&gs.turn==='you'&&!gs.pendingSilo&&(<>
            <div className="action-form" style={{borderColor:'#cc2233'}}>
              <span className="action-lbl" style={{color:'#aa66ff'}}>Arm</span>
              <input ref={inputRef} className="coord-inp"
                value={gs.actionInput}
                onChange={e=>onInput(e.target.value)}
                onKeyDown={onKey}
                placeholder="D4" maxLength={3}/>
            </div>
            <button className="btn btn-go" style={{borderColor:'#cc2233',color:'#ff4455'}} onClick={lockSilo}>Arm Torpedo</button>
            <button className="btn btn-cancel" onClick={closeSiloAction}>✕</button>
            {gs.actionError&&<span className="err-txt">{gs.actionError}</span>}
          </>)}
        </div>}
      </div>

      {/* TOASTS */}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className="toast" style={{borderColor:t.color,borderLeftColor:t.color,borderLeftWidth:3,color:'#eee'}}>{t.text}</div>
        ))}
      </div>

      {/* GAME OVER */}
      {gs.gameOver&&!spectateMode&&(
        <div className="modal-bg">
          <div className="modal" style={{textAlign:'center',padding:'36px 28px'}}>
            <div style={{fontSize:36,fontWeight:'bold',letterSpacing:3,
              color:gs.winner==='draw'?'#aa8833':gs.winner==='you'||gs.winner==='p1'||gs.winner==='p2'?'#44cc44':'#cc4444',
              marginBottom:10}}>
              {gs.winner==='draw'?'MUTUAL DESTRUCTION':gs.winner==='you'?'YOU WIN':gs.winner==='p1'?'PLAYER 1 WINS':gs.winner==='p2'?'PLAYER 2 WINS':'YOU LOSE'}
            </div>
            <div style={{fontSize:13,color:'#555',marginBottom:28}}>
              {gs.winner==='draw'
                ? 'Equal territory — both sides annihilated each other.'
                : gs.winner==='you'
                  ? gs.territory>=21
                    ? 'You reached 21 territory tiles.'
                    : 'You destroyed the opponent\'s territory.'
                  : gs.winner==='ai'
                    ? gs.aiTerritory>=21
                      ? `${botName(gs.aiDifficulty)} reached 21 territory tiles.`
                      : 'Your territory was destroyed.'
                    : gs.winner==='p1'
                      ? (gs.winReason||'Player 1 won.')
                      : gs.winner==='p2'
                        ? (gs.winReason||'Player 2 won.')
                        : 'Your territory was destroyed.'}
            </div>
            <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
              <button className="btn-start" style={{fontSize:14,padding:'10px 32px'}} onClick={()=>{setSpectateMode(false);setSpectateViewOpp(false);setPhase('start');}}>Play Again</button>
              <button className="btn" style={{fontSize:13,padding:'10px 22px',color:'#889988',borderColor:'#2a3a2a',background:'#0a100a'}}
                onClick={()=>{setSpectateMode(true);setSpectateViewOpp(false);}}>View Board</button>
            </div>
          </div>
        </div>
      )}

      {/* SPECTATE BANNER */}
      {gs.gameOver&&spectateMode&&(
        <div style={{position:'fixed',top:0,left:0,right:0,zIndex:8000,pointerEvents:'auto',display:'flex',alignItems:'center',justifyContent:'space-between',
          background:'rgba(4,8,4,0.94)',borderBottom:'1px solid #1a2a1a',padding:'6px 14px',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:10,fontWeight:'bold',letterSpacing:3,textTransform:'uppercase',
              color:gs.winner==='draw'?'#aa8833':gs.winner==='you'||gs.winner==='p1'||gs.winner==='p2'?'#44cc44':'#cc4444'}}>
              {gs.winner==='draw'?'▌ DRAW — SPECTATING':gs.winner==='you'||gs.winner==='p1'||gs.winner==='p2'?'▌ VICTORY — SPECTATING':'▌ DEFEAT — SPECTATING'}
            </span>
            <span style={{fontSize:9,color:'#3a4a3a',letterSpacing:1}}>Read-only view</span>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {(gs.pvpMode&&gs.p2||gs.aiMode)&&<>
              <button className={`btn${!spectateViewOpp?' on':''}`} style={{fontSize:11,padding:'3px 12px',
                background:!spectateViewOpp?'#101a10':'#080e08',borderColor:!spectateViewOpp?'#2a5a2a':'#1a2a1a',
                color:!spectateViewOpp?'#55aa55':'#445544'}}
                onClick={()=>setSpectateViewOpp(false)}>Your Board</button>
              <button className={`btn${spectateViewOpp?' on':''}`} style={{fontSize:11,padding:'3px 12px',
                background:spectateViewOpp?'#101a10':'#080e08',borderColor:spectateViewOpp?'#2a5a2a':'#1a2a1a',
                color:spectateViewOpp?'#55aa55':'#445544'}}
                onClick={()=>setSpectateViewOpp(true)}>Opponent's Board</button>
            </>}
            <button className="btn-start" style={{fontSize:12,padding:'5px 18px'}}
              onClick={()=>{setSpectateMode(false);setSpectateViewOpp(false);setPhase('start');}}>Play Again</button>
          </div>
        </div>
      )}

      {/* SPY INTEL PANEL */}
      {gs.spyPanelOpen&&gs.spy&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setGs(p=>({...p,spyPanelOpen:false}))}>
          <div className="modal">
            <div className="modal-hdr">
              <div>
                <div className="modal-title" style={{color:'#3399cc'}}>⊙ Spy Intel — {COLS[gs.spy.c]}{gs.spy.r+1}</div>
                <div className="modal-sub" style={{color:gs.spy.status==='detonated'?'#ff6622':gs.spy.status==='used'?'#888':gs.spy.status==='found'?'#ffaa33':'#3399cc'}}>
                  Status: {gs.spy.status==='placed'?'Active. Awaiting discovery.':gs.spy.status==='found'?'Found by enemy. Detonate before they buy!':gs.spy.status==='used'?'Void. Enemy made a purchase.':'Detonated'}
                </div>
              </div>
              <button className="modal-close" onClick={()=>setGs(p=>({...p,spyPanelOpen:false}))}>✕</button>
            </div>
            {gs.spy.data&&(<>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
                <div style={{background:'#080814',border:'1px solid #1a1a30',borderRadius:6,padding:'8px 12px'}}>
                  <div style={{fontSize:10,color:'#888',textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>Territory (snapshot)</div>
                  <div style={{fontSize:24,fontWeight:'bold',color:'#3aacac'}}>{gs.spy.data.territory}</div>
                </div>
                <div style={{background:'#080814',border:'1px solid #1a1a30',borderRadius:6,padding:'8px 12px'}}>
                  <div style={{fontSize:10,color:'#888',textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>SR (snapshot)</div>
                  <div style={{fontSize:24,fontWeight:'bold',color:'#7777ff'}}>{gs.spy.data.sr}</div>
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,color:'#888',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Inventory (snapshot)</div>
                {gs.spy.data.inventory.length===0
                  ?<div style={{fontSize:11,color:'#555',fontStyle:'italic'}}>No items at time of deployment</div>
                  :gs.spy.data.inventory.map((item,i)=>(
                    <div key={i} style={{fontSize:11,color:'#bbc',background:'#080814',border:'1px solid #1a1a28',borderRadius:4,padding:'4px 8px',marginBottom:4}}>{item.name}</div>
                  ))
                }
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,color:'#888',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Recent Activity (snapshot)</div>
                <div style={{maxHeight:140,overflowY:'auto',background:'#050508',border:'1px solid #0f0f18',borderRadius:4,padding:6}}>
                  {gs.spy.data.log.length===0
                    ?<div style={{fontSize:11,color:'#555',fontStyle:'italic',padding:'4px 6px'}}>No activity recorded</div>
                    :gs.spy.data.log.map((e,i)=>(
                      <div key={i} style={{fontSize:11,color:e.who==='ai'||e.who==='p2'||e.who==='p1'?'#ffaa77':'#99bbff',padding:'3px 6px',borderBottom:'1px solid #0f0f18'}}>
                        <span style={{fontWeight:'bold',fontSize:10,marginRight:4}}>{e.who.toUpperCase()}</span>{e.text}
                      </div>
                    ))
                  }
                </div>
              </div>
            </>)}
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn" style={{fontSize:12,color:'#888'}} onClick={()=>setGs(p=>({...p,spyPanelOpen:false}))}>Close</button>
              {(gs.spy.status==='placed'||gs.spy.status==='found')&&(
                <button className="btn" style={{background:'#2a0808',borderColor:'#882222',color:'#ff5544',fontSize:12}}
                  onClick={detonateSpy}>Detonate</button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* SHOP MODAL */}
      {gs.shopOpen&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&set_({shopOpen:false,pendingToast:{text:'Shop closed',color:'#555555'}})}>
          <div className="modal">
            <div className="modal-hdr">
              <div>
                <div className="modal-title">⬡ SHOP</div>
                <div className="modal-sub">Current SR: {gs.sr}</div>
              </div>
              <button className="modal-close" onClick={()=>set_({shopOpen:false,pendingToast:{text:'Shop closed',color:'#555555'}})}>✕</button>
            </div>
            {gs.shopDisabledRounds>0&&(
              <div style={{background:'#1a0808',border:'1px solid #661111',borderRadius:6,padding:'10px 14px',marginBottom:12,color:'#ff5544',fontSize:12}}>
                ⚠ Shop locked by spy detonation — {gs.shopDisabledRounds} turn{gs.shopDisabledRounds!==1?'s':''} remaining. You cannot buy items.
              </div>
            )}
            {SHOP_ITEMS.map(item=>(
              <div key={item.id} className="shop-item">
                <div className="shop-body">
                  <div className="shop-name">{item.name}</div>
                  <div className="shop-cost">{item.cost} SR</div>
                  <div className="shop-desc">{item.desc}</div>
                </div>
                <button className="btn btn-buy"
                  disabled={gs.sr<item.cost||gs.shopDisabledRounds>0}
                  onClick={()=>buyItem(item)}>BUY</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
