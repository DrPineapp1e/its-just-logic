      pendingToast:next?{text:`${next==='search'?'Search':'Attack'} mode`,color:'#667788'}:{text:'Action cancelled',color:'#444444'}}));
  };
  const closeAction=()=>set_({activeAction:null,actionInput:'',actionError:'',actionWarned:null,pendingToast:{text:'Action cancelled',color:'#444444'}});
  const onInput=v=>{
    const val=v.toUpperCase();
    const coord=parseCoord(val);
    let autoWarn='';
    if(coord&&(gs.activeAction==='search'||gs.activeAction==='attack')){
      if(gs.hitGrid[coord.row][coord.col]!==null)
        autoWarn=`${val} already searched — press Go/Enter again to proceed.`;
    }
    setGs(p=>({...p,actionInput:val,actionError:autoWarn,actionWarned:autoWarn?val:null}));
  };
  const onKey=e=>{
    if(e.key==='Enter'){
      if(gs.activeAction==='search') startRadarSearch();
      else if(gs.activeAction==='attack') submitAttack();
      else if(gs.activeAction==='laser') submitLaser();
      else if(gs.siloActive) submitSilo();
    }
    if(e.key==='Escape'){
      if(gs.siloActive) closeSiloAction();
      else closeAction();
    }
  };

  const vp=gs.placementMode?validPlacements(gs.yourGrid):new Set();
  const vsp=gs.siloPlaceMode?validSiloPositions(gs.yourGrid):new Set();

  const hitCounts=useMemo(()=>{
    let cr=0,br=0,sr=0;
    for(const cell of gs.hitGrid.flat()){
      if(cell?.result==='cr') cr++;
      else if(cell?.result==='br') br++;
      else if(cell?.result==='sr') sr++;
    }
    return {cr,br,sr};
  },[gs.hitGrid]);

  // Fog of war: each territory/starting/station tile reveals a 5×5 area on YOUR grid
  const visibleCells=useMemo(()=>{
    const vis=new Set();
    for(let r=0;r<12;r++) for(let c=0;c<12;c++){
      const t=gs.yourGrid[r][c].type;
      if(t==='territory'||t==='starting'||t==='station'){
        for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<12&&nc>=0&&nc<12) vis.add(nr*12+nc);
        }
      }
    }
    return vis;
  },[gs.yourGrid]);


  function renderYour(cell,r,c){
    const key=`${r},${c}`;
    const isValid=gs.placementMode&&vp.has(key);
    const isHovered=gs.placementMode&&hoverCell&&hoverCell.r===r&&hoverCell.c===c;
    const mEnter=gs.placementMode?{onMouseEnter:()=>setHoverCell({r,c})}:{};

    if(gs.spyPlaceMode){
      if(cell.type==='empty') return(
        <div key={c} className="cell c-spy-pick" onClick={()=>placeSpy(r,c)} title={`${COLS[c]}${r+1} — plant spy here`}>
          <span style={{color:'#2299cc',fontSize:14,lineHeight:1}}>⊙</span>
        </div>
      );
    }

    if(gs.siloPlaceMode){
      if(vsp.has(`${r},${c}`)) return(
        <div key={c} className="cell c-silo-pick" onClick={()=>placeSilo(r,c)} title={`${COLS[c]}${r+1} — place torpedo silo here`}>
          <span style={{color:'#aa66ff',fontSize:16,lineHeight:1}}>⊕</span>
        </div>
      );
    }

    if(gs.stationMode){
      if(cell.type==='empty') return(
        <div key={c} className="cell c-station-place" onClick={()=>placeStation(r,c)} title={`${COLS[c]}${r+1} — place station tile here`}>
          <span style={{color:'#009999',fontSize:13,lineHeight:1,opacity:.6}}>◈</span>
        </div>
      );
    }

    if(gs.rerootMode){
      if(cell.type==='territory'||cell.type==='station') return(
        <div key={c} className="cell c-reroot-pick" onClick={()=>applyReroot(r,c)} title={`${COLS[c]}${r+1} — add as extra root`}>
          <span style={{color:'#22cc55',fontSize:14,lineHeight:1}}>★</span>
        </div>
      );
    }

    if(gs.shieldMode&&(cell.type==='territory'||cell.type==='starting'||cell.type==='station')){
      const alreadyShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
      return(
        <div key={c} className="cell" style={{background:'#081828',borderColor:'#2266cc',cursor:alreadyShielded?'not-allowed':'pointer'}}
          onClick={alreadyShielded?undefined:()=>applyShield(r,c)}
          title={alreadyShielded?`${COLS[c]}${r+1} — already shielded`:`${COLS[c]}${r+1} — click to shield`}>
          <span style={{fontSize:13,lineHeight:1}}>{alreadyShielded?'🛡':'🔲'}</span>
        </div>
      );
    }

    // Spy tile always visible to owner — check before hover/valid/fog
    if(cell.type==='spy'){
      const st=gs.spy?.status||'placed';
      const spyColor=st==='detonated'?'#cc4422':st==='found'||st==='used'?'#3377aa':'#2299cc';
      const spyLbl=st==='detonated'?'BOOM':st==='used'?'USED':st==='found'?'FOUND':'SPY';
      return(
        <div key={c} className="cell c-spy" title={`${COLS[c]}${r+1} — Spy Resource (${spyLbl})`} {...mEnter}>
          <span style={{color:spyColor,fontSize:14,lineHeight:1,opacity:st==='detonated'?.4:.8}}>⊙</span>
          <span style={{fontSize:6,color:'rgba(100,180,255,.55)',lineHeight:1,marginTop:1}}>{spyLbl}</span>
        </div>
      );
    }

    if(isHovered){
      return(
        <div key={c} className={`cell ${isValid?'c-ghost-valid':'c-ghost-invalid'}`}
          onClick={isValid?()=>placeTile(r,c):undefined}
          title={`${COLS[c]}${r+1}`} {...mEnter}>
          <span style={{color:isValid?'#ffee00':'#332200',fontSize:20,lineHeight:1}}>◆</span>
        </div>
      );
    }

    if(isValid) return(
      <div key={c} className="cell c-valid" onClick={()=>placeTile(r,c)} title={`${COLS[c]}${r+1}`} {...mEnter}/>
    );

    if(!visibleCells.has(r*12+c)){
      return <div key={c} className="cell c-fog" title={`${COLS[c]}${r+1}`} {...mEnter}/>;
    }

    let cls='cell ';
    let inner=null;
    switch(cell.type){
      case 'starting': {
        const sShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
        cls+='c-starting';
        inner=<><span className="cell-icon" style={{color:'#ffe066',fontSize:15}}>★</span>{sShielded&&<span style={{fontSize:7,position:'absolute',bottom:1,right:2,color:'#55aaff'}}>🛡</span>}</>;
        break;
      }
      case 'territory': {
        const tShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
        cls+='c-territory';
        inner=tShielded?<span style={{fontSize:10,color:'#55aaff',lineHeight:1}}>🛡</span>:null;
        break;
      }
      case 'cr':
        cls+='c-cr'+(cell.collected?' done':'');
        inner=cell.collected
          ?<span style={{color:'#1a3a1a',fontSize:13}}>✕</span>
          :<span className="cell-icon" style={{color:'#33aa33'}}>◆</span>;
        break;
      case 'br':
        cls+='c-br'+(cell.collected?' done':'');
        inner=cell.collected
          ?<span style={{color:'#3a1a1a',fontSize:13}}>✕</span>
          :<span className="cell-icon" style={{color:'#cc3333'}}>◆</span>;
        break;
      case 'sr_res':
        cls+='c-srr'+(cell.collected?' done':'');
        inner=cell.collected
          ?<span style={{color:'#1a1a3a',fontSize:13}}>✕</span>
          :<span className="cell-icon" style={{color:'#3333cc'}}>◆</span>;
        break;
      case 'station': {
        const stShielded=gs.shieldedCells.some(s=>s.r===r&&s.c===c);
        cls+='c-station';
        inner=stShielded
          ?<span style={{fontSize:10,color:'#55aaff',lineHeight:1}}>🛡</span>
          :<span style={{color:'#00cccc',fontSize:13,lineHeight:1}}>◈</span>;
        break;
      }
      case 'silo': {
        const isActiveSilo=gs.siloActive&&gs.siloActive.r===r&&gs.siloActive.c===c;
        return(
          <div key={c} className={`cell c-silo${isActiveSilo?' c-station-sel':''}`}
            onClick={()=>!gs.siloPlaceMode&&openSiloAction(r,c)}
            title={`${COLS[c]}${r+1} — Torpedo Silo${isActiveSilo?' (targeting…)':(gs.siloPlaceMode?'':' — click to fire')}`}
            {...mEnter}>
            <span style={{color:isActiveSilo?'#cc88ff':'#aa66ff',fontSize:14,lineHeight:1}}>⊕</span>
            <span style={{fontSize:6,color:'rgba(180,130,255,.65)',lineHeight:1,marginTop:1}}>SILO</span>
          </div>
        );
      }
      case 'broken': {
        const bMeta={cr:{color:'#33aa33',label:'CR'},br:{color:'#aa3333',label:'BR'},sr:{color:'#3333aa',label:'SR'},territory:{color:'#888844',label:'Terr.'},station:{color:'#008877',label:'Stn.'}}[cell.wasType]||{};
        const {color:bxc='#555',label:blbl='?'}=bMeta;
        return(
          <div key={c} className="cell c-broken" title={`${COLS[c]}${r+1} — destroyed`} {...mEnter}>
            <span style={{color:bxc,fontSize:15,lineHeight:1,opacity:.5}}>✕</span>
            <span style={{fontSize:6,color:'rgba(255,255,255,.3)',lineHeight:1,marginTop:1}}>{blbl}</span>
          </div>
        );
      }
      default:
        cls+='c-empty';
    }
    return <div key={c} className={cls} title={`${COLS[c]}${r+1}`} {...mEnter}>{inner}</div>;
  }

  function renderHit(cell,r,c){
    if(!cell) return <div key={c} className="cell c-hit-blank" title={`${COLS[c]}${r+1}`}/>;
    if(cell.result==='miss') return(
      <div key={c} className="cell c-hit-miss" title={`${COLS[c]}${r+1} — Miss`}>
        <span style={{color:'#ddbb00',fontSize:16,lineHeight:1,fontWeight:'bold',textShadow:'0 0 6px rgba(220,180,0,.6)'}}>×</span>
      </div>
    );
    if(cell.result==='broken'){
      const wasMap={
        cr:       {cls:'c-hit-cr',  xc:'#33aa33', lbl:'CR'},
        br:       {cls:'c-hit-br',  xc:'#aa3333', lbl:'BR'},
        sr:       {cls:'c-hit-sr',  xc:'#3333aa', lbl:'SR'},
        territory:{cls:'c-hit-ter', xc:'#aaaa22', lbl:'Terr.'},
        station:  {cls:'c-hit-ter', xc:'#009988', lbl:'Stn.'},
      };
      const {cls,xc,lbl}=wasMap[cell.wasType]||{cls:'c-hit-miss',xc:'#555',lbl:'?'};
      return(
        <div key={c} className={`cell ${cls} c-hit-broken`} title={`${COLS[c]}${r+1} — destroyed`}>
          <span style={{color:xc,fontSize:15,lineHeight:1,opacity:.55}}>✕</span>
          <span style={{fontSize:6,color:'rgba(255,255,255,.35)',lineHeight:1,marginTop:1}}>{lbl}</span>
        </div>
      );
    }
    const map={
      cr:       {cls:'c-hit-cr',  xc:'#44cc44', lbl:'CR'},
      br:       {cls:'c-hit-br',  xc:'#cc4444', lbl:'BR'},
      sr:       {cls:'c-hit-sr',  xc:'#4444cc', lbl:'SR'},
      territory:{cls:'c-hit-ter', xc:'#ccaa22', lbl:'Terr.'},
      station:  {cls:'c-hit-ter', xc:'#00aacc', lbl:'Stn.'},
    };
    const {cls,xc,lbl}=map[cell.result]||{cls:'c-hit-miss',xc:'#444',lbl:''};
    return(
      <div key={c} className={`cell ${cls}`} title={`${COLS[c]}${r+1}`}>
        <span style={{color:xc,fontSize:18,lineHeight:1}}>◆</span>
        <span style={{fontSize:7,color:'rgba(255,255,255,.5)',lineHeight:1,marginTop:1}}>{lbl}</span>
      </div>
    );
  }


  const selInvItem=gs.inventory.find(i=>i.iid===gs.selectedItem);

  if(phase==='loading') return(
    <div className="loading-screen">
      <div className="start-title" style={{fontSize:32,letterSpacing:6}}>It's Just Logic</div>
      <div style={{fontSize:12,color:'#888',letterSpacing:4,textTransform:'uppercase'}}>Loading…</div>
    </div>
  );

  if(phase==='difficulty') return(
    <div className="start-screen">
      <div className="start-corner start-corner-tl"/>
      <div className="start-corner start-corner-tr"/>
      <div className="start-corner start-corner-bl"/>
      <div className="start-corner start-corner-br"/>
      <div className="start-title">It's Just Logic</div>
      <div style={{display:'flex',flexDirection:'column',gap:'10px',alignItems:'center'}}>
        <button className="btn-start" onClick={()=>chooseAi('easy')}>BOT Lyra <span style={{fontSize:11,opacity:0.6}}>Easy</span></button>
        <button className="btn-start" onClick={()=>chooseAi('medium')}>BOT Cassiopeia <span style={{fontSize:11,opacity:0.6}}>Medium</span></button>
        <button className="btn-start" onClick={()=>chooseAi('hard')}>BOT Orion <span style={{fontSize:11,opacity:0.6}}>Hard</span></button>
        <button style={{marginTop:4,fontSize:11,color:'#888',background:'none',border:'none',cursor:'pointer',letterSpacing:2,textTransform:'uppercase',fontFamily:'inherit'}} onClick={()=>setPhase('start')}>← Back</button>
      </div>
    </div>
  );

  if(phase==='start') return(
    <div className="start-screen">
      <div className="start-corner start-corner-tl"/>
      <div className="start-corner start-corner-tr"/>
      <div className="start-corner start-corner-bl"/>
      <div className="start-corner start-corner-br"/>
      <div style={{position:'absolute',bottom:16,right:20,fontSize:9,color:'rgba(80,100,60,.28)',letterSpacing:2,fontFamily:'Courier New,monospace',userSelect:'none'}}>V.0.1.5</div>
      <div className="start-title">It's Just Logic</div>
      <div style={{display:'flex',flexDirection:'column',gap:'10px',alignItems:'center'}}>
        <button className="btn-start" onClick={()=>startGame(false)}>Start 1v0</button>
        <button className="btn-start" onClick={startPvp}>1v1</button>
        <button className="btn-start" onClick={()=>setPhase('difficulty')}>1 v BOT</button>
      </div>
    </div>
  );

  if(pvpLoading) return(
    <div className="loading-screen">
      <div className="start-title" style={{fontSize:28,letterSpacing:6}}>Pass the Device</div>
      <div style={{fontSize:72,fontWeight:'bold',color:'#8888ff',lineHeight:1}}>{pvpCountdown}</div>
      <div style={{fontSize:11,color:'#888',letterSpacing:4,textTransform:'uppercase'}}>Player {gs.activePlayer===1?2:1} — get ready</div>
    </div>
  );

  return(
    <div className="app">
      <div className="main">

        {/* LEFT — GRID */}
        <div className="grid-area">
          <div className="grid-controls">
            <span className="view-title">{gs.viewMode==='your'?'YOUR GRID':'HIT GRID'}</span>
            <button className={`btn btn-view${gs.viewMode==='your'?' on':''}`}
              onClick={()=>set_({viewMode:'your',pendingToast:{text:'Viewing your grid',color:'#557799'}})}>Your Grid</button>
            <button className={`btn btn-view${gs.viewMode==='hit'?' on':''}`}
              onClick={()=>set_({viewMode:'hit',pendingToast:{text:'Viewing hit grid',color:'#557799'}})}>Hit Grid</button>
          </div>

          <div className="grid-scroll-wrap">
            <div className="grid-scroll" onMouseLeave={()=>gs.placementMode&&setHoverCell(null)}>
              <div style={{position:'relative',display:'inline-block'}}>
                <div className="grid-wrap">
                  <div className="col-labels">
                    {COLS.map(l=><div key={l} className="col-lbl">{l}</div>)}
                  </div>
                  {Array.from({length:12},(_,r)=>(
                    <div key={r} className="grid-row">
                      <div className="row-lbl">{r+1}</div>
                      {Array.from({length:12},(_,c)=>
                        gs.viewMode==='your'
                          ?renderYour(gs.yourGrid[r][c],r,c)
                          :renderHit(gs.hitGrid[r][c],r,c)
                      )}
                    </div>
                  ))}
                </div>
                {radarCell&&(
                  <div className="grid-radar-overlay">
                    <div className="grid-radar-sweep"/>
                    <div className="grid-radar-ring-mid"/>
                    <div className="grid-radar-ring-inner"/>
                    <div className="grid-radar-cross-h"/>
                    <div className="grid-radar-cross-v"/>
                    <div className="grid-radar-border"/>
                    <div className="grid-radar-info">
                      <div className="grid-radar-coord">{COLS[radarCell.c]}{radarCell.r+1}</div>
                      <div className="grid-radar-scanning">Scanning…</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>

        {/* MID PANEL */}
        <div className="mid">
          <div className="mid-head">History</div>
          <div className="log-list">
            {gs.log.length===0
              ?<div className="log-empty">No moves yet</div>
              :gs.log.map((entry,i)=>(
                <div key={i} className={`log-entry ${entry.who==='you'||entry.who==='p1'?'log-you':entry.who==='p2'?'log-p2':'log-opp'}`}>
                  <span className="log-who">{entry.who==='you'?'YOU':entry.who==='p1'?'P1':entry.who==='p2'?'P2':'ORION'}</span>
                  {entry.who==='ai'?'made a move.':entry.text}
                </div>
              ))
            }
          </div>
          <div className="notes-wrap">
            <div className="mid-head">Notes</div>
            <textarea className="notes-inp"
              value={notes}
              onChange={e=>setNotes(e.target.value)}
              placeholder="Write notes here…"/>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div className="right">
          <div className="stat-card">
            <div className="stat-name">Territory</div>
            <div className={`stat-val sv-ter`}>{gs.territory}</div>
          </div>
          <div className="stat-card">
            <div className="stat-name">SR</div>
            <div className={`stat-val sv-sr`}>{gs.sr}</div>
          </div>

          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <button className="btn btn-shop" style={{flex:1}} onClick={()=>set_({shopOpen:true,pendingToast:{text:'Shop opened',color:'#aaaa44'}})}>⬡ SHOP</button>
            {gs.spy&&<button className="btn" style={{flex:1,borderColor:'#1a5577',color:'#3399cc',background:'#081420',fontSize:11}}
              onClick={()=>setGs(p=>({...p,spyPanelOpen:!p.spyPanelOpen}))}>⊙ Intel</button>}
          </div>
          {gs.shopDisabledRounds>0&&(
            <div style={{fontSize:10,color:'#ff5544',background:'#1a0808',border:'1px solid #551111',borderRadius:4,padding:'4px 8px',textAlign:'center'}}>
              ⚠ Shop locked by spy — {gs.shopDisabledRounds} turn{gs.shopDisabledRounds!==1?'s':''} left
            </div>
          )}

          <div>
            <div className="sec-head">Inventory</div>
            {gs.inventory.length===0
              ?<div className="inv-empty">No items owned</div>
              :gs.inventory.map(item=>(
                <div key={item.iid} className={`inv-item${gs.selectedItem===item.iid?' sel':''}`}>
                  <span className="inv-name">{item.name}</span>
                  <button className={`btn btn-sel${gs.selectedItem===item.iid?' on':''}`}
                    onClick={()=>selectItem(item.iid)}>
                    {gs.selectedItem===item.iid?'Active':'Select'}
                  </button>
                </div>
              ))
            }
          </div>

        </div>
      </div>

      {/* BOTTOM BAR */}
      <div className="bottom">
        {gs.placementMode&&(
          <div className="place-banner">
            Place territory: {gs.placementRemaining} remaining — click a highlighted square
          </div>
        )}
        {selInvItem&&!gs.stationMode&&!gs.siloPlaceMode&&!gs.spyPlaceMode&&!gs.activeAction&&(
          <div className="sel-banner" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
            <span style={{fontSize:11}}>
              {selInvItem.name} — {
                selInvItem.id==='emp'?'stuns BOT Orion for 1 turn; you get a bonus move.':
                selInvItem.id==='shield'?'click a territory tile on your grid to protect it.':
                selInvItem.id==='station'?`place 1 station tile anywhere on your grid (${countStation(gs.yourGrid)}/7 tiles used).`:
                selInvItem.id==='addroot'?'add an extra root to any territory or station tile.':
                selInvItem.id==='pirates'?'steal 1 territory tile from opponent.':
                selInvItem.id==='laser'?'destroy any tile on opponent\'s grid.':
                selInvItem.id==='torpedo'?'place a torpedo silo adjacent to your territory.':
                selInvItem.id==='spy'?'plant a decoy SR tile anywhere on your grid.':
                'choose a target.'
              }
            </span>
            <button className="btn btn-go" style={{padding:'4px 14px',fontSize:12}} onClick={useItem}>Use</button>
          </div>
        )}
        {gs.stationMode&&(
          <div className="place-banner" style={{borderColor:'#009999',color:'#00cccc',display:'flex',alignItems:'center',gap:10}}>
            <span>Space Station: click any empty cell to place a station tile (station: {countStation(gs.yourGrid)}/7)</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelStation}>Cancel</button>
          </div>
        )}
        {gs.siloPlaceMode&&(
          <div className="place-banner" style={{borderColor:'#7733cc',color:'#aa66ff',display:'flex',alignItems:'center',gap:10}}>
            <span>Torpedo Silo: click a highlighted cell adjacent to your territory to place</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelSiloPlace}>Cancel</button>
          </div>
        )}
        {gs.spyPlaceMode&&(
          <div className="place-banner" style={{borderColor:'#1a6699',color:'#3399cc',display:'flex',alignItems:'center',gap:10}}>
            <span>Spy Resource: click any empty cell on your grid — enemy will see an SR there</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelSpyPlace}>Cancel</button>
          </div>
        )}
        {gs.rerootMode&&(
          <div className="place-banner" style={{borderColor:'#22aa55',color:'#44cc77',display:'flex',alignItems:'center',gap:10}}>
            <span>Add Root: click any territory or station tile to add it as an extra root</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelReroot}>Cancel</button>
          </div>
        )}
        {gs.shieldMode&&(
          <div className="place-banner" style={{borderColor:'#2266cc',color:'#55aaff',display:'flex',alignItems:'center',gap:10}}>
            <span>Shield: click a territory tile on your grid to protect it</span>
            <button className="btn btn-cancel" style={{padding:'4px 10px',fontSize:11}} onClick={cancelShield}>Cancel</button>
          </div>
        )}
        {gs.actionMessage&&!gs.activeAction&&(
          <div className="msg-txt">{gs.actionMessage}</div>
        )}
        {gs.detectedAlarm&&gs.turn==='you'&&!gs.gameOver&&(
          <div className="alarm-banner">
            <span style={{fontSize:16,lineHeight:1}}>⚠</span>
            <span>TERRITORY DETECTED — the enemy has located your territory!</span>
            <button className="alarm-x" onClick={dismissAlarm}>✕</button>
          </div>
        )}
        <div className="bottom-row">
          {gs.pvpMode&&<span style={{fontSize:'10px',color:'#8888aa',letterSpacing:'1px',textTransform:'uppercase'}}>Player {gs.activePlayer}'s Turn</span>}
          {gs.aiMode&&<span style={{fontSize:'10px',color:'#444',letterSpacing:'1px',textTransform:'uppercase'}}>{botName(gs.aiDifficulty)}</span>}
          {gs.aiMode&&gs.turn==='ai'&&(
            <span className="msg-txt" style={{color:'#dd8866'}}>{botName(gs.aiDifficulty)} is thinking…</span>
          )}
          {phase==='game'&&gs.turn==='you'&&!gs.gameOver&&!gs.pvpMode&&(
            <span style={{fontSize:13,fontWeight:'bold',fontVariantNumeric:'tabular-nums',
              color:timeLeft<=10?'#cc4444':timeLeft<=30?'#ffaa00':'#556677',
              border:'1px solid',borderColor:timeLeft<=10?'#441111':timeLeft<=30?'#443300':'#1a2233',
              borderRadius:4,padding:'2px 8px',background:'#080810'}}>
              {Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}
            </span>
          )}
          {gs.pvpMode&&gs.pvpPendingPass&&!gs.gameOver&&(
            <button className="btn-start" style={{fontSize:13,padding:'8px 28px'}} onClick={passPvp}>Pass Device →</button>
          )}
          {!gs.pvpPendingPass&&gs.viewMode==='hit'&&gs.turn==='you'&&<>
          <button className={`btn btn-search${gs.activeAction==='search'?' btn-view on':''}`}
            onClick={()=>openAction('search')}>Search</button>
          <button className={`btn btn-attack${gs.activeAction==='attack'?' btn-view on':''}`}
            onClick={()=>openAction('attack')}>Attack</button>
          </>}
          {!gs.aiMode&&!gs.pvpMode&&<>
            <button className="btn" style={{background:'#081808',borderColor:'#1a4a1a',color:'#44cc44',fontSize:11,padding:'5px 10px'}}
              onClick={()=>setGs(prev=>({...prev,placementMode:true,placementRemaining:(prev.placementRemaining||0)+1,actionMessage:'Cheat: place 1 territory tile.'}))}>
              +1 CR
            </button>
            <button className="btn" style={{background:'#08081e',borderColor:'#1a1a44',color:'#8888ff',fontSize:11,padding:'5px 10px'}}
              onClick={()=>setGs(prev=>({...prev,sr:prev.sr+1}))}>
              +1 SR
            </button>
          </>}

          {!gs.pvpPendingPass&&gs.activeAction&&gs.turn==='you'&&(<>
            <div className="action-form">
              <span className="action-lbl">
                {gs.activeAction==='search'?'Search':gs.activeAction==='attack'?'Attack':'Laser'}
              </span>
              <input ref={inputRef} className="coord-inp"
                value={gs.actionInput}
                onChange={e=>onInput(e.target.value)}
                onKeyDown={onKey}
                placeholder="D4" maxLength={3}/>
            </div>
            <button className="btn btn-go" disabled={!!radarCell}
              onClick={gs.activeAction==='search'?startRadarSearch:gs.activeAction==='attack'?submitAttack:submitLaser}>Go</button>
            <button className="btn btn-cancel" onClick={closeAction}>✕</button>
            {gs.actionError&&<span className="err-txt">{gs.actionError}</span>}
          </>)}
          {gs.siloActive&&!gs.activeAction&&gs.turn==='you'&&(<>
            <div className="action-form" style={{borderColor:'#7733cc'}}>
              <span className="action-lbl" style={{color:'#aa66ff'}}>Silo</span>
              <input ref={inputRef} className="coord-inp"
                value={gs.actionInput}
                onChange={e=>onInput(e.target.value)}
                onKeyDown={onKey}
                placeholder="D4" maxLength={3}/>
            </div>
            <button className="btn btn-go" style={{borderColor:'#7733cc',color:'#aa66ff'}} onClick={submitSilo}>Fire</button>
            <button className="btn btn-cancel" onClick={closeSiloAction}>✕</button>
            {gs.actionError&&<span className="err-txt">{gs.actionError}</span>}
          </>)}
        </div>
      </div>

      {/* TOASTS */}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className="toast" style={{borderColor:t.color,borderLeftColor:t.color,borderLeftWidth:3,color:'#eee'}}>{t.text}</div>
        ))}
      </div>

      {/* GAME OVER */}
      {gs.gameOver&&(
        <div className="modal-bg">
          <div className="modal" style={{textAlign:'center',padding:'36px 28px'}}>
            <div style={{fontSize:36,fontWeight:'bold',letterSpacing:3,color:gs.winner==='you'||gs.winner==='p1'||gs.winner==='p2'?'#44cc44':'#cc4444',marginBottom:10}}>
              {gs.winner==='you'?'YOU WIN':gs.winner==='p1'?'PLAYER 1 WINS':gs.winner==='p2'?'PLAYER 2 WINS':'YOU LOSE'}
            </div>
            <div style={{fontSize:13,color:'#555',marginBottom:28}}>
              {gs.winner==='you'
                ? gs.territory>=21
                  ? 'You reached 21 territory tiles.'
                  : 'You destroyed the opponent\'s territory.'
                : gs.winner==='ai'
                  ? gs.aiTerritory>=21
                    ? `${botName(gs.aiDifficulty)} reached 21 territory tiles.`
                    : 'Your territory was destroyed.'
                  : gs.winner==='p1'
                    ? 'Player 1 won.'
                    : gs.winner==='p2'
                      ? 'Player 2 won.'
                      : 'Your territory was destroyed.'}
            </div>
            <button className="btn-start" style={{fontSize:14,padding:'10px 32px'}} onClick={()=>setPhase('start')}>Play Again</button>
          </div>
        </div>
      )}

      {/* SPY INTEL PANEL */}
      {gs.spyPanelOpen&&gs.spy&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setGs(p=>({...p,spyPanelOpen:false}))}>
          <div className="modal">
            <div className="modal-hdr">
              <div>
                <div className="modal-title" style={{color:'#3399cc'}}>⊙ Spy Intel — {COLS[gs.spy.c]}{gs.spy.r+1}</div>
                <div className="modal-sub" style={{color:gs.spy.status==='detonated'?'#ff6622':gs.spy.status==='used'?'#888':gs.spy.status==='found'?'#ffaa33':'#3399cc'}}>
                  Status: {gs.spy.status==='placed'?'Active — awaiting discovery':gs.spy.status==='found'?'⚠ Found by enemy — detonate before they buy!':gs.spy.status==='used'?'Void — enemy made a purchase':'💥 Detonated'}
                </div>
              </div>
              <button className="modal-close" onClick={()=>setGs(p=>({...p,spyPanelOpen:false}))}>✕</button>
            </div>
            {gs.spy.data&&(<>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
                <div style={{background:'#080814',border:'1px solid #1a1a30',borderRadius:6,padding:'8px 12px'}}>
                  <div style={{fontSize:10,color:'#888',textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>Territory (snapshot)</div>
                  <div style={{fontSize:24,fontWeight:'bold',color:'#3aacac'}}>{gs.spy.data.territory}</div>
                </div>
                <div style={{background:'#080814',border:'1px solid #1a1a30',borderRadius:6,padding:'8px 12px'}}>
                  <div style={{fontSize:10,color:'#888',textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>SR (snapshot)</div>
                  <div style={{fontSize:24,fontWeight:'bold',color:'#7777ff'}}>{gs.spy.data.sr}</div>
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,color:'#888',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Inventory (snapshot)</div>
                {gs.spy.data.inventory.length===0
                  ?<div style={{fontSize:11,color:'#555',fontStyle:'italic'}}>No items at time of deployment</div>
                  :gs.spy.data.inventory.map((item,i)=>(
                    <div key={i} style={{fontSize:11,color:'#bbc',background:'#080814',border:'1px solid #1a1a28',borderRadius:4,padding:'4px 8px',marginBottom:4}}>{item.name}</div>
                  ))
                }
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:10,color:'#888',textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Recent Activity (snapshot)</div>
                <div style={{maxHeight:140,overflowY:'auto',background:'#050508',border:'1px solid #0f0f18',borderRadius:4,padding:6}}>
                  {gs.spy.data.log.length===0
                    ?<div style={{fontSize:11,color:'#555',fontStyle:'italic',padding:'4px 6px'}}>No activity recorded</div>
                    :gs.spy.data.log.map((e,i)=>(
                      <div key={i} style={{fontSize:11,color:e.who==='ai'||e.who==='p2'||e.who==='p1'?'#ffaa77':'#99bbff',padding:'3px 6px',borderBottom:'1px solid #0f0f18'}}>
                        <span style={{fontWeight:'bold',fontSize:10,marginRight:4}}>{e.who.toUpperCase()}</span>{e.text}
                      </div>
                    ))
                  }
                </div>
              </div>
            </>)}
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn" style={{fontSize:12,color:'#888'}} onClick={()=>setGs(p=>({...p,spyPanelOpen:false}))}>Close</button>
              {(gs.spy.status==='placed'||gs.spy.status==='found')&&(
                <button className="btn" style={{background:'#2a0808',borderColor:'#882222',color:'#ff5544',fontSize:12}}
                  onClick={detonateSpy}>💥 Detonate</button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* SHOP MODAL */}
      {gs.shopOpen&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&set_({shopOpen:false,pendingToast:{text:'Shop closed',color:'#555555'}})}>
          <div className="modal">
            <div className="modal-hdr">
              <div>
                <div className="modal-title">⬡ SHOP</div>
                <div className="modal-sub">Current SR: {gs.sr}</div>
              </div>
              <button className="modal-close" onClick={()=>set_({shopOpen:false,pendingToast:{text:'Shop closed',color:'#555555'}})}>✕</button>
            </div>
            {gs.shopDisabledRounds>0&&(
              <div style={{background:'#1a0808',border:'1px solid #661111',borderRadius:6,padding:'10px 14px',marginBottom:12,color:'#ff5544',fontSize:12}}>
                ⚠ Shop locked by spy detonation — {gs.shopDisabledRounds} turn{gs.shopDisabledRounds!==1?'s':''} remaining. You cannot buy items.
              </div>
            )}
            {SHOP_ITEMS.map(item=>(
              <div key={item.id} className="shop-item">
                <div className="shop-body">
                  <div className="shop-name">{item.name}</div>
                  <div className="shop-cost">{item.cost} SR</div>
                  <div className="shop-desc">{item.desc}</div>
                </div>
                <button className="btn btn-buy"
                  disabled={gs.sr<item.cost||gs.shopDisabledRounds>0}
                  onClick={()=>buyItem(item)}>BUY</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
