<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#070b07"/>

  <!-- Outer border -->
  <rect x="8" y="8" width="240" height="240" fill="none" stroke="#3a5a28" stroke-width="2"/>

  <!-- Corner accents -->
  <polyline points="8,8 28,8 28,14" fill="none" stroke="#5a8840" stroke-width="3"/>
  <polyline points="228,8 248,8 248,28" fill="none" stroke="#5a8840" stroke-width="3"/>
  <polyline points="8,228 8,248 28,248" fill="none" stroke="#5a8840" stroke-width="3"/>
  <polyline points="248,228 248,248 228,248" fill="none" stroke="#5a8840" stroke-width="3"/>

  <!-- Grid lines (faint) -->
  <line x1="85" y1="20" x2="85" y2="236" stroke="#1a2a14" stroke-width="1"/>
  <line x1="128" y1="20" x2="128" y2="236" stroke="#1a2a14" stroke-width="1"/>
  <line x1="171" y1="20" x2="171" y2="236" stroke="#1a2a14" stroke-width="1"/>
  <line x1="20" y1="85" x2="236" y2="85" stroke="#1a2a14" stroke-width="1"/>
  <line x1="20" y1="128" x2="236" y2="128" stroke="#1a2a14" stroke-width="1"/>
  <line x1="20" y1="171" x2="236" y2="171" stroke="#1a2a14" stroke-width="1"/>

  <!-- Crosshairs -->
  <line x1="20" y1="128" x2="236" y2="128" stroke="#2a4a20" stroke-width="1.5"/>
  <line x1="128" y1="20" x2="128" y2="236" stroke="#2a4a20" stroke-width="1.5"/>

  <!-- Radar rings (square) -->
  <rect x="60" y="60" width="136" height="136" fill="none" stroke="#2a5a1e" stroke-width="1.5" opacity="0.7"/>
  <rect x="90" y="90" width="76" height="76" fill="none" stroke="#2a5a1e" stroke-width="1" opacity="0.5"/>

  <!-- Sweep glow (quarter arc as polygon) -->
  <polygon points="128,128 236,128 236,20 128,20" fill="url(#sweep)" opacity="0.25"/>
  <defs>
    <linearGradient id="sweep" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#60c040" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#60c040" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Scan line -->
  <line x1="128" y1="128" x2="236" y2="20" stroke="#70dd40" stroke-width="1.5" opacity="0.5"/>
</svg>
